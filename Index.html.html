<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mill Mate</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e0c">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Firebase CDN — cached by service worker after first load -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" onerror="window._firebaseFailed=true"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js" onerror="window._firebaseFailed=true"></script>
<style>
:root {
  --bg:#0f0e0c;--surface:#1a1916;--surface2:#242220;--border:#2e2c28;
  --amber:#e8a020;--amber-dim:#9c6a10;--amber-glow:rgba(232,160,32,0.15);
  --red:#c0392b;--green:#27ae60;--text:#e8e0d0;--text-dim:#7a7060;
  --mill1:#e8a020;--mill2:#4a9eff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;}
.screen{display:none;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;}
.screen.active{display:flex;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--amber);}
.mill-toggle{display:flex;gap:8px;}
.mill-btn{padding:8px 16px;border-radius:6px;border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--text-dim);}
.mill-btn.active-m1{background:var(--mill1);color:#000;border-color:var(--mill1);}
.mill-btn.active-m2{background:var(--mill2);color:#000;border-color:var(--mill2);}
.mill-btn.active-all{background:#9b59b6;color:#fff;border-color:#9b59b6;}

.scroll-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;-webkit-overflow-scrolling:touch;}

/* BOTTOM NAV */
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(6,1fr);flex-shrink:0;padding:0;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 4px 18px;cursor:pointer;border:none;background:none;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.5px;gap:5px;transition:color 0.15s;}
.nav-btn .icon{font-size:28px;line-height:1;}
.nav-btn.active{color:var(--amber);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--amber);margin-bottom:8px;}

.big-btn{width:100%;padding:18px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.15s;margin-bottom:10px;text-align:left;display:flex;align-items:center;gap:12px;}
.big-btn:active{background:var(--amber-glow);border-color:var(--amber);}
.big-btn .bi{font-size:20px;width:28px;text-align:center;}

.species-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px;}
.species-btn{padding:26px 14px;border-radius:8px;border:2px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;cursor:pointer;text-align:center;}
.species-btn:active,.species-btn.selected{background:var(--amber-glow);border-color:var(--amber);color:var(--amber);}
.species-sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);margin-top:4px;}

/* NUMPAD: 4 columns, enter stacked on right */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.numpad-4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.num-btn{padding:20px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:24px;font-weight:600;cursor:pointer;font-family:'IBM Plex Mono',monospace;text-align:center;}
.num-btn:active{background:var(--amber-glow);border-color:var(--amber);transform:scale(0.96);}
.num-btn.zero{grid-column:span 2;}
.num-btn.del{color:var(--red);font-size:20px;}
.num-btn.enter{background:var(--amber);color:#000;font-weight:700;border-color:var(--amber);font-size:14px;}
.num-btn.enter-tall{background:var(--amber);color:#000;font-weight:700;border-color:var(--amber);font-size:14px;grid-row:span 2;}
.numpad-display{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:right;font-size:40px;font-weight:600;color:var(--amber);margin-bottom:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:2px;}
.numpad-display .dl{font-size:12px;color:var(--text-dim);text-align:left;margin-bottom:2px;}

.action-btn{width:100%;padding:18px;border-radius:8px;border:none;font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.btn-primary{background:var(--amber);color:#000;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:var(--red);color:#fff;}
.btn-success{background:var(--green);color:#fff;}

.back-btn{background:none;border:none;color:var(--amber);font-size:26px;cursor:pointer;padding:4px 8px 4px 0;}

.list-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.list-item:active{border-color:var(--amber-dim);}
.li-l{flex:1;} .li-t{font-size:15px;font-weight:600;} .li-s{font-size:12px;color:var(--text-dim);margin-top:3px;}
.li-r{text-align:right;} .li-v{font-size:17px;font-weight:600;color:var(--amber);} .li-v2{font-size:12px;color:var(--text-dim);}

.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.badge-green{background:rgba(39,174,96,0.15);color:var(--green);border:1px solid rgba(39,174,96,0.3);}
.badge-red{background:rgba(192,57,43,0.15);color:var(--red);border:1px solid rgba(192,57,43,0.3);}
.badge-m1{background:rgba(232,160,32,0.2);color:var(--mill1);border:1px solid var(--mill1);}
.badge-m2{background:rgba(74,158,255,0.2);color:var(--mill2);border:1px solid var(--mill2);}

#login-screen{justify-content:center;align-items:center;padding:32px;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:6px;color:var(--amber);text-align:center;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:36px;letter-spacing:2px;}
.user-btn{width:100%;padding:20px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;cursor:pointer;margin-bottom:10px;text-align:left;}
.user-btn:active{border-color:var(--amber);background:var(--amber-glow);}
.pin-display{font-size:34px;letter-spacing:16px;text-align:center;margin:20px 0;color:var(--amber);}

.review-float{position:fixed;bottom:96px;right:16px;background:var(--surface);border:1px solid var(--amber);color:var(--amber);border-radius:50px;padding:10px 16px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;z-index:100;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.rc{background:var(--amber);color:#000;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}

.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.sl{font-size:12px;color:var(--text-dim);} .sv{font-size:15px;font-weight:600;color:var(--amber);}
.sh{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--text-dim);margin:14px 0 8px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;justify-content:flex-end;flex-direction:column;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px;max-height:80vh;overflow-y:auto;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--amber);margin-bottom:16px;}

.text-input{width:100%;padding:16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:16px;margin-bottom:10px;outline:none;}
.text-input:focus{border-color:var(--amber);}

.search-bar{width:100%;padding:14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:15px;margin-bottom:10px;outline:none;}
.search-bar::placeholder{color:var(--text-dim);}
.search-bar:focus{border-color:var(--amber);}

.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.filter-chip.active{background:var(--amber-glow);border-color:var(--amber);color:var(--amber);}

.export-btn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;}

.toast{position:fixed;top:-80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--amber);border-radius:8px;padding:12px 20px;font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--amber);z-index:300;transition:top 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.5);white-space:nowrap;}
.toast.show{top:16px;}

.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px;}
.sync-dot.ok{background:var(--green);} .sync-dot.saving{background:var(--amber);animation:pd 0.6s infinite;} .sync-dot.err{background:var(--red);}
@keyframes pd{0%,100%{opacity:1;}50%{opacity:0.3;}}

.log-num{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;border-radius:50%;background:var(--amber-dim);color:#000;font-size:11px;font-weight:700;flex-shrink:0;margin-right:8px;}

.del-btn{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:6px 8px;opacity:0.6;}
.del-btn:active{opacity:1;color:var(--red);}

.select-btn{padding:14px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;cursor:pointer;text-align:center;}
.select-btn:active,.select-btn.selected{background:var(--amber-glow);border-color:var(--amber);color:var(--amber);}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}

.tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.empty-state{text-align:center;padding:36px 16px;color:var(--text-dim);font-size:14px;}

.taken-up-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}

.date-input{padding:10px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--amber);font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none;}
.date-input:focus{border-color:var(--amber);}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.cal-dow{font-size:9px;color:var(--text-dim);text-align:center;padding:4px 0;font-weight:700;letter-spacing:0.5px;}
.cal-day{border-radius:6px;padding:4px 2px 5px;min-height:52px;cursor:pointer;position:relative;background:var(--surface2);border:1px solid var(--border);transition:border-color 0.1s;}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-day.today{border-color:var(--amber);}
.cal-day.has-data{background:var(--surface);}
.cal-day:active:not(.empty){border-color:var(--amber);background:var(--amber-glow);}
.cal-dn{font-size:11px;font-weight:700;text-align:center;color:var(--text-dim);margin-bottom:3px;}
.cal-day.today .cal-dn{color:var(--amber);}
.cal-dot{width:5px;height:5px;border-radius:50%;margin:1px auto;}
.sheet-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;flex-direction:column;}
.sheet-overlay.open{display:flex;}
.sheet-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;}
.sheet-tabs{overflow-x:auto;display:flex;gap:3px;flex-shrink:0;scrollbar-width:none;border-bottom:1px solid var(--border);}
.sheet-tabs::-webkit-scrollbar{display:none;}
.sheet-body{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}
@media print{body{background:white;color:black;}.no-print{display:none!important;}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div id="login-screen" class="screen active">
  <div class="login-logo">MILL MATE</div>
  <div class="login-sub">SAWMILL MANAGEMENT</div>
  <div style="width:100%;">
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:6px;letter-spacing:1px;">YOUR NAME</div>
    <input class="text-input" id="login-name" placeholder="Enter your name..." autocomplete="off" autocorrect="off" autocapitalize="words" style="margin-bottom:16px;">
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:6px;letter-spacing:1px;">PIN</div>
    <div class="pin-display" id="pin-display">○ ○ ○ ○</div>
    <div class="numpad" id="pin-pad">
      <button class="num-btn" onclick="pinK('1')">1</button>
      <button class="num-btn" onclick="pinK('2')">2</button>
      <button class="num-btn" onclick="pinK('3')">3</button>
      <button class="num-btn" onclick="pinK('4')">4</button>
      <button class="num-btn" onclick="pinK('5')">5</button>
      <button class="num-btn" onclick="pinK('6')">6</button>
      <button class="num-btn" onclick="pinK('7')">7</button>
      <button class="num-btn" onclick="pinK('8')">8</button>
      <button class="num-btn" onclick="pinK('9')">9</button>

<div id="app-screen" class="screen">
  <div class="header no-print">
    <div style="display:flex;align-items:center;gap:6px;">
      <button class="back-btn" id="global-back" onclick="globalBack()" style="display:none;">←</button>
      <div class="header-title" id="header-title">MILL MATE</div>

    </div>
    <div class="mill-toggle">
      <button class="mill-btn" id="mill1-btn" onclick="setMill(1)">GR</button>
      <button class="mill-btn" id="mill2-btn" onclick="setMill(2)">FC</button>
      <button class="mill-btn" id="millall-btn" onclick="setMill('all')">ALL</button>
    </div>
  </div>
  <div id="main-content" class="scroll-content"></div>
  <div class="bottom-nav no-print" id="main-nav">
    <button class="nav-btn" id="nav-home" onclick="showHome()"><span class="icon">⌂</span>HOME</button>
    <button class="nav-btn" id="nav-logs" onclick="showLoads()"><span class="icon">⊞</span>LOGS</button>
    <button class="nav-btn" id="nav-takeup" onclick="showTakeUp()"><span class="icon">⚙</span>SAW</button>
    <button class="nav-btn" id="nav-lumber" onclick="showLumber()"><span class="icon">▦</span>LUMBER</button>
    <button class="nav-btn" id="nav-mats" onclick="showMats()"><span class="icon">▤</span>MATS</button>
    <button class="nav-btn" id="nav-more" onclick="showMore()"><span class="icon">≡</span>MORE</button>
  </div>
</div>

<button class="review-float no-print" id="review-float" style="display:none;" onclick="showReview()">REVIEW <span class="rc" id="review-count">0</span></button>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)"><div class="modal" id="modal-content" onclick="event.stopPropagation()"></div></div>
<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet-bar">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--amber);" id="sheet-title">EXPORT</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <a id="sheet-csv-btn" href="#" download="" style="background:var(--amber);color:#000;padding:7px 12px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;text-decoration:none;">↓ CSV</a>
      <button onclick="closeSheet()" style="background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:6px;padding:7px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;">✕ CLOSE</button>
    </div>
  </div>
  <div class="sheet-tabs" id="sheet-tabs"></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<script>
// ===== SERVICE WORKER =====
if('serviceWorker' in navigator){
  const sw=`
const C='mm-v5';
const URLS=[
  '/',
  'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js',
  'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js',
  'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap'
];
self.addEventListener('install',e=>{
  e.waitUntil(
    caches.open(C).then(c=>Promise.allSettled(URLS.map(u=>c.add(u).catch(()=>{}))))
    .then(()=>self.skipWaiting())
  );
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
});
self.addEventListener('fetch',e=>{
  e.respondWith(
    caches.match(e.request).then(r=>{
      if(r)return r;
      return fetch(e.request).then(resp=>{
        if(resp&&resp.status===200){
          const clone=resp.clone();
          caches.open(C).then(c=>c.put(e.request,clone));
        }
        return resp;
      }).catch(()=>caches.match('/'));
    })
  );
});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
if('caches' in window){
  // Cache this page so it opens offline from home screen
  window.addEventListener('load',()=>{
    caches.open('mm-v5').then(c=>{
      c.put(location.href,new Response(document.documentElement.outerHTML,{headers:{'Content-Type':'text/html'}}));
    }).catch(()=>{});
  });
}

// ===== STATE =====
let S={
  mill:1,user:null,screen:'home',stack:[],
  newLoad:{logger:'',date:td(),mill:1,logs:[]},
  eSpecies:null,eGrade:null,
  tuStep:'price',tuPrice:'',tuFoot:'',tuDate:td(),
  npVal:'',
  fLoads:'all',fLumber:'all',fSales:'all',fReport:'today',
  saleTypeF:'all',
  users:[{id:1,name:'John',pin:'1234',role:'operator'},{id:2,name:'Mike',pin:'5678',role:'operator'},{id:3,name:'Owner',pin:'0000',role:'admin'},{id:4,name:'Viewer',pin:'1111',role:'viewer'}],
  loggers:['Bob Smith','Ray Johnson','Dale Williams','Tommy Lee'],
  customers:['Anderson Farms','Creek Side Lumber','Hart Construction','Local Pickup'],
  species:[
    {id:'s1',name:'OT',label:'Oak Tie',grades:[{id:'g1',name:'OT1',price:0.45},{id:'g2',name:'OT2',price:0.40},{id:'g3',name:'OT3',price:0.35}]},
    {id:'s2',name:'MT',label:'Mixed Tie',grades:[{id:'g4',name:'MT1',price:0.38},{id:'g5',name:'MT2',price:0.32}]},
    {id:'s3',name:'OAK',label:'Oak',grades:[{id:'g6',name:'Select',price:0.55},{id:'g7',name:'#1',price:0.48},{id:'g8',name:'#2',price:0.38}]},
    {id:'s4',name:'PINE',label:'Pine',grades:[{id:'g9',name:'Select',price:0.42},{id:'g10',name:'#1',price:0.35},{id:'g11',name:'#2',price:0.28}]}
  ],
  lumberTypes:['2x4','2x6','2x8','2x10','2x12','1x6','1x8','1x10','1x12','Cants','Slabs','Ties','4x4','4x6','6x6'],

// ===== HELPERS =====
function td(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function tmrw(){const d=new Date();d.setDate(d.getDate()+1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fd(d){if(!d)return'';const[y,m,dy]=d.split('-');return m+'/'+dy+'/'+y;}
function fm(n){return'$'+Number(n).toFixed(2);}
function fb(n){return Number(n).toLocaleString()+' bf';}
function mn(n){return n===1?'GR':'FC';}
function canM(){return S.user&&(S.user.role==='admin'||!S.users.some(u=>u.role==='admin'));}
function canO(){
  if(!S.user||S.user.role==='viewer')return false;
  if(window._matsBoth)return false;
  if(S.user.role==='operator'&&S.user.mill&&S.user.mill!==S.mill)return false;
  return true;
}
function isViewer(){return S.user&&S.user.role==='viewer';}
function esc(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}

function dago(n){const d=new Date();d.setDate(d.getDate()-n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekStart(){const d=new Date();d.setDate(d.getDate()-d.getDay());return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fdr(items,f,r){if(r==='all')return items.filter(i=>i[f]<=td());if(r==='today')return items.filter(i=>i[f]===td());const c=r==='week'?weekStart():r==='month'?dago(30):dago(90);return items.filter(i=>i[f]>=c&&i[f]<=td());}
function chips(cur,fn){return'<div class="filter-row">'+[['today','Today'],['week','7d'],['month','30d'],['quarter','90d'],['all','All']].map(([k,l])=>'<button class="filter-chip'+(cur===k?' active':'')+'" onclick="'+fn+"('"+k+"')\">" +l+'</button>').join('')+'</div>';}

// ===== FULL-SCREEN SHEET =====
function openSheet(title,tabsHtml,bodyHtml,csvUrl,csvFilename){
  document.getElementById('sheet-title').textContent=title;
  document.getElementById('sheet-tabs').innerHTML=tabsHtml||'';
  document.getElementById('sheet-tabs').style.display=tabsHtml?'flex':'none';
  document.getElementById('sheet-body').innerHTML=bodyHtml;
  const csvBtn=document.getElementById('sheet-csv-btn');
  csvBtn.href=csvUrl||'#';csvBtn.download=csvFilename||'export.csv';
  document.getElementById('sheet-overlay').classList.add('open');
}
function closeSheet(){document.getElementById('sheet-overlay').classList.remove('open');}

function buildSheetTable(headers,rows){
  const th='background:#1a1916;color:#e8a020;padding:8px 12px;border:1px solid #2e2c28;white-space:nowrap;position:sticky;top:0;z-index:2;font-family:\'IBM Plex Mono\',monospace;font-size:11px;';
  const td1='padding:7px 12px;border:1px solid #2e2c28;white-space:nowrap;font-family:\'IBM Plex Mono\',monospace;font-size:11px;';
  let t='<table style="border-collapse:collapse;min-width:100%;"><thead><tr>'+headers.map(h=>'<th style="'+th+'">'+h+'</th>').join('')+'</tr></thead><tbody>';
  rows.forEach((r,i)=>{
    const isSep=String(r[0]).startsWith('---');
    const isTot=String(r[0]).startsWith('TOTAL');
    t+='<tr style="background:'+(isTot?'rgba(232,160,32,0.12)':isSep?'#0a0908':i%2===0?'#1a1916':'#242220')+';">';
    t+=r.map(v=>'<td style="'+td1+'color:'+(isTot?'#e8a020':isSep?'#2e2c28':'#e8e0d0')+';">'+String(v??'')+'</td>').join('');
    t+='</tr>';
  });
  return t+'</tbody></table>';
}
function makeCSV(headers,rows){
  const e=v=>'"'+String(v??'').replace(/"/g,'""')+'"';
  return[headers.join(','),...rows.map(r=>r.map(e).join(','))].join('\n');
}
// Generic sheet — lumber/sales still use this
function showSheet(title,headers,rows,filename){
  const csv=makeCSV(headers,rows);
  const csvUrl=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  openSheet(title,'',buildSheetTable(headers,rows),csvUrl,filename);
}

function exportLumber(){
  const bundles=S.bundles.filter(b=>b.mill===S.mill&&!b.isBeam);
  const types=[...new Set(bundles.map(b=>b.type))].sort();
  // Summary: one row per type
  const sumHeaders=['Type','In Stock (bundles)','In Stock (BF)','Sold (bundles)','Sold (BF)','Total Added'];
  const sumRows=types.map(t=>{
    const tb=bundles.filter(b=>b.type===t);
    const inStock=tb.filter(b=>!b.sold);const sold=tb.filter(b=>b.sold);
    return[t,inStock.length,inStock.reduce((s,b)=>s+b.footage,0).toLocaleString()+' bf',sold.length,sold.reduce((s,b)=>s+b.footage,0).toLocaleString()+' bf',tb.length];
  });
  sumRows.push(['---','---','---','---','---','---']);
  const totalInStock=bundles.filter(b=>!b.sold).reduce((s,b)=>s+b.footage,0);
  sumRows.push(['TOTAL','',totalInStock.toLocaleString()+' bf','','','']);

  // Detail: every bundle
  const detHeaders=['Date','Type','Board Feet','Status','Added By'];
  const detRows=[...bundles].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(b=>[fd(b.date)||'no date',b.type,b.footage.toLocaleString()+' bf',b.sold?'SOLD':'IN STOCK',b.addedBy||b.by||'']);

  const csv=makeCSV(detHeaders,detRows);
  const csvUrl=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  const tabs='<div style="padding:6px 14px;font-size:10px;color:var(--text-dim);align-self:center;">LUMBER — '+mn(S.mill)+'</div>';
  const body='<div style="padding:12px 0 4px 12px;font-family:\'Bebas Neue\',sans-serif;font-size:14px;letter-spacing:2px;color:var(--text-dim);">SUMMARY BY TYPE</div>'+buildSheetTable(sumHeaders,sumRows)+'<div style="padding:12px 0 4px 12px;font-family:\'Bebas Neue\',sans-serif;font-size:14px;letter-spacing:2px;color:var(--text-dim);">ALL BUNDLES</div>'+buildSheetTable(detHeaders,detRows);
  openSheet('LUMBER — '+mn(S.mill),tabs,body,csvUrl,'lumber_'+mn(S.mill)+'_'+td()+'.csv');
}

function exportSales(){

    tbl+='<td style="'+tdL+';color:'+(l.paid?'#27ae60':'#c0392b')+';">'+(l.paid?'PAID':'UNPAID')+'</td>';
    gradeKeys.forEach(k=>{

  document.getElementById('sheet-title').textContent='LOADS — '+mn(S.mill);
  document.getElementById('sheet-tabs').innerHTML=tabs;
  document.getElementById('sheet-tabs').style.display='flex';
  document.getElementById('sheet-body').innerHTML=tbl;
  const csvBtn=document.getElementById('sheet-csv-btn');
  csvBtn.href=csvUrl;csvBtn.download='loads_'+logger.replace(/ /g,'_')+'_'+td()+'.csv';

// ===== FIREBASE STORAGE =====
const DATA_KEYS=['users','loggers','customers','species','lumberTypes','loads','takeup','bundles','sales','lctr','bctr','sctr','tctr','beamInv','beamInvFC','beamLog','mats','matShipments','bolts','boltsFC','boltLog','mctr','blctr','blgctr','invCounts','ictr','loggerPrices','msctr','activityLog','alctr','manhours'];

// Firebase is loaded via CDN scripts in <head> — db is set after init
let _db=null;
let _unsubscribe=null;
let _saveTimer=null;

function setSS(s){const d=document.getElementById('sync-dot');if(d)d.className='sync-dot '+s;}

function initFirebase(){
  if(window._firebaseFailed||typeof firebase==='undefined'){
    console.log('Firebase unavailable — running from local cache');
    setSS('ok');return;
  }
  try{
    const app=firebase.initializeApp({
      apiKey:"AIzaSyCwa2ccecPHisLt3X5ARYwJv5q7fyDecPg",
      authDomain:"mill-mate.firebaseapp.com",
      projectId:"mill-mate",
      storageBucket:"mill-mate.firebasestorage.app",
      messagingSenderId:"583026648976",
      appId:"1:583026648976:web:fa8ec762c9ab07d84bf515"
    });
    _db=firebase.firestore(app);
    // Enable offline persistence — app works without internet, syncs when back online
    _db.enablePersistence({synchronizeTabs:true}).catch(e=>{
      if(e.code==='failed-precondition'){console.warn('Multiple tabs open');}
      else if(e.code==='unimplemented'){console.warn('Persistence not available');}
    });

function applyData(d){
  DATA_KEYS.forEach(k=>{if(d[k]!=null)S[k]=d[k];});
  if(!S.beamLog)S.beamLog=[];
  if(!S.mats)S.mats=[];

  if(!S.bolts)S.bolts={lam:0,std:0};
  if(!S.boltsFC)S.boltsFC={lam:0,std:0};
  if(!S.boltLog)S.boltLog=[];

  if(S.beamInvFC===undefined)S.beamInvFC=0;
  if(!S.msctr)S.msctr=1;
  if(!S.manhours)S.manhours=[];
  if(!S.activityLog)S.activityLog=[];
  if(!S.alctr)S.alctr=1;
}

async function save(){
  setSS('saving');
  // Always save to localStorage as backup
  try{const d={};DATA_KEYS.forEach(k=>d[k]=S[k]);d._ts=Date.now();localStorage.setItem('millmate-local',JSON.stringify(d));}catch(e){}
  // Debounce Firebase writes — wait 600ms after last call before writing
  if(_saveTimer)clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    if(!_db){setSS('ok');return;}
    try{
      const d={};DATA_KEYS.forEach(k=>d[k]=S[k]);d._ts=Date.now();
      await _db.collection('millmate').doc('data').set({payload:JSON.stringify(d),ts:d._ts});
      setSS('ok');
    }catch(e){console.warn('Firebase save error:',e);setSS('err');}
  },600);
}

async function load(){
  // Try Firebase first
  if(_db){
    try{
      const doc=await _db.collection('millmate').doc('data').get();
      if(doc.exists){
        const d=JSON.parse(doc.data().payload);
        applyData(d);
        S._lastTs=d._ts||0;
        return;
      }
    }catch(e){console.warn('Firebase load error:',e);}
  }
  // Fallback: localStorage
  try{
    const raw=localStorage.getItem('millmate-local')||localStorage.getItem('millmate-shared')||localStorage.getItem('millmate-data');
    if(raw){const d=JSON.parse(raw);applyData(d);S._lastTs=d._ts||0;}
  }catch(e){console.warn('localStorage load error:',e);}
}

// Real-time listener — updates all devices instantly when data changes
function startPolling(){
  if(!_db)return;
  if(_unsubscribe)_unsubscribe();
  _unsubscribe=_db.collection('millmate').doc('data').onSnapshot(doc=>{
    if(!doc.exists)return;
    try{
      const d=JSON.parse(doc.data().payload);
      if(d._ts&&d._ts>S._lastTs){
        applyData(d);
        S._lastTs=d._ts;
        // Refresh current screen for other devices
        if(S.user){
          if(isViewer())showViewerDash();
          else if(S.screen==='home')showHome();
          else if(S.screen==='loads')showLoads();
          else if(S.screen==='lumber')showLumber();
          else if(S.screen==='mats')showMats();
        }
        setSS('ok');
      }
    }catch(e){}
  },err=>{console.warn('Snapshot error:',err);setSS('err');});
}

function stopPolling(){
  if(_unsubscribe){_unsubscribe();_unsubscribe=null;}
}

// ===== LOGIN =====
let pinBuf='';
function renderLogin(){
  pinBuf='';
  updPin();
  document.getElementById('login-name').value='';
  document.getElementById('login-error').textContent='';
  document.getElementById('pin-pad').innerHTML=
    [1,2,3,4,5,6,7,8,9].map(n=>'<button class="num-btn" onclick="pinK(\''+n+'\')">'+n+'</button>').join('')+
    '<button class="num-btn del" onclick="pinK(\'del\')">⌫</button>'+
    '<button class="num-btn zero" onclick="pinK(\'0\')">0</button>'+
    '<button class="num-btn enter" onclick="pinK(\'enter\')">LOGIN</button>';
}
function pinK(k){
  if(k==='del'){pinBuf=pinBuf.slice(0,-1);updPin();return;}
  if(k==='enter'){attemptLogin();return;}
  if(pinBuf.length<4){pinBuf+=k;updPin();}
}
function updPin(){
  const el=document.getElementById('pin-display');
  if(el)el.textContent='● '.repeat(pinBuf.length)+'○ '.repeat(4-pinBuf.length);
}
function attemptLogin(){
  const nameInput=document.getElementById('login-name').value.trim().toLowerCase();
  const errEl=document.getElementById('login-error');
  if(!nameInput){errEl.textContent='Enter your name';return;}
  if(pinBuf.length<4){errEl.textContent='Enter your 4-digit PIN';return;}
  // Find user by name (case insensitive) and PIN
  const user=S.users.find(u=>u.name.toLowerCase()===nameInput&&u.pin===pinBuf);
  if(user){
    errEl.textContent='';
    S.user=user;
    showScr('app-screen');
    startPolling();
    if(isViewer())showViewerDash();
    else showHome();
    setMill(S.mill);
  }else{
    pinBuf='';updPin();
    errEl.textContent='Name or PIN not recognised';
    const d=document.getElementById('pin-display');
    d.style.color='var(--red)';
    setTimeout(()=>{d.style.color='var(--amber)';errEl.textContent='';},1500);
  }
}

function renderLoadsList(loads){

    return'<div class="list-item" onclick="showLoadDetail('+l.id+')"><div class="li-l"><div class="li-t">'+l.logger+'</div><div class="li-s">'+fd(l.date)+' · '+l.logs.length+' logs</div><div class="tag-row"><span class="badge badge-'+(l.mill===1?'m1':'m2')+'">'+mn(l.mill)+'</span> <span class="badge '+(l.paid?'badge-green':'badge-red')+'">'+(l.paid?'PAID':'UNPAID')+'</span></div></div><div class="li-r"><div class="li-v">'+fb(bf)+'</div><div class="li-v2">'+fm(v)+'</div></div></div>';}).join('');
}
let _loadsTimer;
function filterLoadsDebounced(){clearTimeout(_loadsTimer);_loadsTimer=setTimeout(()=>{
  let loads=[...S.loads].filter(l=>l.mill===S.mill);loads=fdr(loads,'date',S.fLoads);
  if(!window._showPaidLoads)loads=loads.filter(l=>!l.paid);

  const tBF=l.logs.reduce((s,lg)=>s+lg.footage,0);const tVal=l.logs.reduce((s,lg)=>s+(lg.footage*lg.price),0);

  $mc().innerHTML=`
    <div class="card"><div class="card-title">${l.logger}</div>
      <div class="stat-row"><span class="sl">DATE</span><span class="sv">${fd(l.date)}</span></div>
      <div class="stat-row"><span class="sl">MILL</span><span class="sv">${mn(l.mill)}</span></div>

      <div class="stat-row"><span class="sl">TOTAL</span><span class="sv">${fb(tBF)}</span></div>
      <div class="stat-row"><span class="sl">VALUE</span><span class="sv">${fm(tVal)}</span></div>

function moveLoad(id){

  const from=mn(l.mill);l.mill=l.mill===1?2:1;
  logActivity('MOVED TO '+mn(l.mill),'Load #'+id+' · '+l.logger+' · from '+from);

}
function togglePaid(id){const l=S.loads.find(x=>x.id===id);if(l){l.paid=!l.paid;logActivity(l.paid?'MARKED PAID':'MARKED UNPAID',l.logger+' Load #'+l.id);save();showLoadDetail(id);toast(l.paid?'Marked Paid':'Marked Unpaid');}}
function delLoadLog(lid,i){const l=S.loads.find(x=>x.id===lid);if(!l)return;const lg=l.logs[i];logActivity('DELETED LOG',l.logger+' · '+lg.gradeName+' · '+fb(lg.footage));l.logs.splice(i,1);if(!l.logs.length){S.loads=S.loads.filter(x=>x.id!==lid);save();showLoads();}else{save();showLoadDetail(lid);}}
function editLoadLog(lid,i){const l=S.loads.find(x=>x.id===lid);if(!l||!canO())return;const lg=l.logs[i];
  openModal('<div class="modal-title">EDIT LOG #'+(i+1)+'</div><div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;">'+lg.gradeName+'</div><div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">FOOTAGE</div><input class="text-input" id="ef" type="number" inputmode="numeric" value="'+lg.footage+'"><div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">PRICE (cents)</div><input class="text-input" id="ep" type="number" inputmode="numeric" value="'+Math.round(lg.price*100)+'"><button class="action-btn btn-primary" onclick="saveEL('+lid+','+i+')">SAVE</button><button class="action-btn btn-secondary" onclick="closeModalForce()">CANCEL</button>');
}
function saveEL(lid,i){const l=S.loads.find(x=>x.id===lid);if(!l)return;const f=parseInt(document.getElementById('ef').value)||0;const p=(parseInt(document.getElementById('ep').value)||0)/100;if(f>0){l.logs[i].footage=f;l.logs[i].price=p;}closeModalForce();save();showLoadDetail(lid);}
function addLogToLoad(lid){S._addToLoad=lid;const l=S.loads.find(x=>x.id===lid);if(!l)return;S.newLoad={logger:l.logger,date:l.date,mill:l.mill,logs:[]};showSpeciesStep();}
function delLoad(id){const l=S.loads.find(x=>x.id===id);if(l)logActivity('DELETED LOAD',l.logger+' · '+l.logs.length+' logs · '+mn(l.mill));S.loads=S.loads.filter(l=>l.id!==id);save();showLoads();toast('Deleted');}

function selLogger(n){S.newLoad.logger=n;S.newLoad.trucker='';showTruckerStep();}

    +'<input class="text-input" id="trucker-rate" type="number" inputmode="numeric" placeholder="e.g. 5 = extra $0.05/bf" value="'+(S.newLoad.truckerRate?Math.round(S.newLoad.truckerRate*100):'')+'">'

function saveTruckerStep(){

function saveLoggerPrices(logger,spId){

function npK(k){

}

}

      <button class="num-btn" onclick="tuK('4')">4</button><button class="num-btn" onclick="tuK('5')">5</button><button class="num-btn" onclick="tuK('6')">6</button><button class="num-btn enter-tall" id="tu-eb" onclick="tuK('enter')" style="grid-row:span 3;">ENTER</button>

function showTUSheet(){
  const date=S.tuDate;const m=S.mill;
  const tl=S.takeup.filter(t=>t.date===date&&t.mill===m);
  setHdr('SHEET — '+fd(date),true);S.stack=[showTakeUp];resetMC();
  if(!window._tuSel)window._tuSel=new Set();
  window._tuSel=new Set(); // reset selection on open
  renderTUSheet(date,m);
}

function renderTUSheet(date,m){
  const tl=S.takeup.filter(t=>t.date===date&&t.mill===m);
  const sel=window._tuSel||new Set();
  const totalBF=tl.reduce((s,t)=>s+t.footage,0);
  const totalVal=tl.reduce((s,t)=>s+(t.footage*t.price),0);
  const selCount=tl.filter(t=>sel.has(t.id)).length;

  const th='padding:8px 10px;border:1px solid var(--border);background:var(--surface);color:var(--amber);font-family:\'IBM Plex Mono\',monospace;font-size:11px;font-weight:700;white-space:nowrap;position:sticky;top:0;';
  const td='padding:7px 10px;border:1px solid var(--border);font-family:\'IBM Plex Mono\',monospace;font-size:12px;color:var(--text);';

  let tbl='<table style="border-collapse:collapse;width:100%;">';
  tbl+='<thead><tr>'
    +'<th style="'+th+'"><input type="checkbox" id="tu-chk-all" onchange="tuSelAll(this.checked)" '+(selCount===tl.length&&tl.length?'checked':'')+'></th>'
    +'<th style="'+th+'">#</th>'
    +'<th style="'+th+'">¢/bf</th>'
    +'<th style="'+th+'">BF</th>'
    +'<th style="'+th+'">VALUE</th>'
    +'<th style="'+th+'"></th>'
    +'</tr></thead><tbody>';

  tl.forEach((t,i)=>{
    const checked=sel.has(t.id);
    tbl+='<tr style="background:'+(checked?'rgba(232,160,32,0.08)':i%2===0?'var(--surface2)':'var(--surface)')+'">'
      +'<td style="'+td+'text-align:center;"><input type="checkbox" '+(checked?'checked':'')+' onchange="tuToggleSel('+t.id+',this.checked)"></td>'
      +'<td style="'+td+'color:var(--text-dim);">'+(i+1)+'</td>'
      +'<td style="'+td+'" onclick="editTU('+t.id+')" style="cursor:pointer;">'+Math.round(t.price*100)+'¢</td>'
      +'<td style="'+td+';font-weight:700;" onclick="editTU('+t.id+')" style="cursor:pointer;">'+t.footage+'</td>'
      +'<td style="'+td+'color:var(--text-dim);">$'+(t.footage*t.price).toFixed(2)+'</td>'
      +'<td style="'+td+'text-align:center;"><button onclick="delTU('+t.id+')" style="background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:2px 6px;">✕</button></td>'
      +'</tr>';
  });

  // Totals row
  tbl+='<tr style="background:rgba(232,160,32,0.12);">'
    +'<td style="'+td+'" colspan="3"><span style="font-weight:700;color:var(--amber);">TOTAL</span></td>'
    +'<td style="'+td+';font-weight:700;color:var(--amber);">'+totalBF.toLocaleString()+'</td>'
    +'<td style="'+td+';font-weight:700;color:var(--amber);">$'+totalVal.toFixed(2)+'</td>'
    +'<td style="'+td+'"></td>'
    +'</tr>';
  tbl+='</tbody></table>';

  let h='<div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;">'+tl.length+' logs · '+fb(totalBF)+' · Tap ¢ or BF to edit</div>';
  h+='<div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;">'+tbl+'</div>';

  if(selCount>0){
    h+='<div style="background:var(--surface);border:1px solid var(--amber);border-radius:8px;padding:12px;margin-bottom:8px;">'
      +'<div style="font-size:12px;font-weight:700;color:var(--amber);margin-bottom:8px;">'+selCount+' SELECTED — MOVE TO DATE:</div>'
      +'<div style="display:flex;gap:8px;align-items:center;">'
      +'<input type="date" id="tu-move-date" class="date-input" style="flex:1;" value="'+tmrw()+'">'
      +'<button onclick="moveTULogs()" style="background:var(--amber);color:#000;border:none;border-radius:6px;padding:10px 14px;font-family:\'IBM Plex Mono\',monospace;font-size:12px;font-weight:700;cursor:pointer;">MOVE</button>'
      +'</div></div>';
  }

  h+='<button class="action-btn btn-secondary" onclick="showTakeUp()">← BACK</button>';
  $mc().innerHTML=h;
  // store date/mill for callbacks
  window._tuSheetDate=date;window._tuSheetMill=m;
}

function tuSelAll(checked){
  const tl=S.takeup.filter(t=>t.date===window._tuSheetDate&&t.mill===window._tuSheetMill);
  if(checked)tl.forEach(t=>window._tuSel.add(t.id));
  else window._tuSel.clear();
  renderTUSheet(window._tuSheetDate,window._tuSheetMill);
}
function tuToggleSel(id,checked){
  if(!window._tuSel)window._tuSel=new Set();
  if(checked)window._tuSel.add(id);else window._tuSel.delete(id);
  renderTUSheet(window._tuSheetDate,window._tuSheetMill);
}
function moveTULogs(){
  const newDate=document.getElementById('tu-move-date')?.value;
  if(!newDate)return;
  const sel=window._tuSel||new Set();
  let count=0;
  S.takeup.forEach(t=>{if(sel.has(t.id)){t.date=newDate;count++;}});
  window._tuSel.clear();
  logActivity('SAW LOG','Moved '+count+' logs to '+fd(newDate)+' · '+mn(S.mill));
  save();toast('Moved '+count+' logs to '+fd(newDate));
  renderTUSheet(window._tuSheetDate,window._tuSheetMill);
}
function editTU(id){
  const t=S.takeup.find(x=>x.id===id);if(!t)return;
  openModal('<div class="modal-title">EDIT LOG</div>'
    +'<div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">PRICE (cents/bf)</div>'
    +'<input class="text-input" id="etu-p" type="number" inputmode="numeric" value="'+Math.round(t.price*100)+'">'
    +'<div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">BOARD FEET</div>'
    +'<input class="text-input" id="etu-f" type="number" inputmode="numeric" value="'+t.footage+'">'
    +'<button class="action-btn btn-primary" onclick="saveEditTU('+id+')">SAVE</button>'
    +'<button class="action-btn btn-secondary" onclick="closeModalForce()">CANCEL</button>');
}
function saveEditTU(id){
  const t=S.takeup.find(x=>x.id===id);if(!t)return;
  const p=parseInt(document.getElementById('etu-p').value);
  const f=parseInt(document.getElementById('etu-f').value);
  if(!isNaN(p)&&p>0)t.price=p/100;
  if(!isNaN(f)&&f>0)t.footage=f;
  save();closeModalForce();renderTUSheet(window._tuSheetDate,window._tuSheetMill);
}
function tuK(k){
  if(S.tuStep==='price'){
    if(k==='del')S.tuPrice=S.tuPrice.slice(0,-1);
    else if(k==='enter'){if(!S.tuPrice)return;S.tuStep='footage';refreshTU();return;}
    else{if(S.tuPrice.length<4)S.tuPrice+=k;}
    const el=document.getElementById('tu-pv');if(el)el.textContent=S.tuPrice||'_';
  }else{
    if(k==='del')S.tuFoot=S.tuFoot.slice(0,-1);
    else if(k==='enter'){if(!S.tuFoot)return;
      S.takeup.push({id:S.tctr++,date:S.tuDate,mill:S.mill,price:parseInt(S.tuPrice)/100,footage:parseInt(S.tuFoot),by:S.user.name});
      logActivity('SAW LOG',fb(parseInt(S.tuFoot))+' @ '+fm(parseInt(S.tuPrice)/100)+'/bf · '+mn(S.mill));
      S.tuPrice='';S.tuFoot='';S.tuStep='price';save();toast('Logged');showTakeUp();return;
    }else{if(S.tuFoot.length<6)S.tuFoot+=k;}
    const el=document.getElementById('tu-fv');if(el)el.textContent=S.tuFoot||'_';
  }
}
function refreshTU(){
  const pb=document.getElementById('tu-pb'),fb2=document.getElementById('tu-fb'),pe=document.getElementById('tu-pv'),fe=document.getElementById('tu-fv'),eb=document.getElementById('tu-eb');
  if(S.tuStep==='footage'){if(pb)pb.style.borderColor='var(--border)';if(fb2)fb2.style.borderColor='var(--amber)';if(pe){pe.style.color='var(--text-dim)';pe.textContent='$0.'+S.tuPrice.padStart(2,'0');}if(fe){fe.style.color='var(--amber)';fe.textContent='_';}if(eb)eb.textContent='LOG IT';}
  else{if(pb)pb.style.borderColor='var(--amber)';if(fb2)fb2.style.borderColor='var(--border)';if(pe){pe.style.color='var(--amber)';pe.textContent='_';}if(fe){fe.style.color='var(--text-dim)';fe.textContent='—';}if(eb)eb.textContent='ENTER';}
}
function delTU(id){const t=S.takeup.find(x=>x.id===id);if(t)logActivity('DELETED SAW LOG',fb(t.footage)+' @ '+fm(t.price)+'/bf · '+mn(t.mill));S.takeup=S.takeup.filter(t=>t.id!==id);save();showTakeUp();}

function sfLumber(f){S.fLumber=f;showLumber();}
function showLumber(){
  S.screen='lumber';resetMC();setNav('lumber');setHdr('LUMBER');
  document.getElementById('review-float').style.display='none';S.stack=[];
  // Build inventory from ALL unsold bundles (not date-filtered) for accurate stock
  const allBundles=S.bundles.filter(b=>b.mill===S.mill&&!b.isBeam&&!b.sold);
  const inv={};const invCount={};
  allBundles.forEach(b=>{
    if(!inv[b.type])inv[b.type]=0;
    if(!invCount[b.type])invCount[b.type]=0;
    inv[b.type]+=b.footage;
    invCount[b.type]++;
  });
  const inStock=Object.values(inv).reduce((a,b)=>a+b,0);
  const matC2={lam:0,'18ft':0,'16ft':0};S.mats.filter(x=>x.mill===S.mill).forEach(x=>matC2[x.type]=(matC2[x.type]||0)+x.count);
  const matShp2={lam:0,'18ft':0,'16ft':0};(S.matShipments||[]).filter(x=>x.mill===S.mill).forEach(x=>matShp2[x.matType]=(matShp2[x.matType]||0)+x.count);
  const netM2={lam:matC2.lam-matShp2.lam,'18ft':matC2['18ft']-matShp2['18ft'],'16ft':matC2['16ft']-matShp2['16ft']};
  const matParts=[];if(netM2.lam)matParts.push(netM2.lam+' lam');if(netM2['18ft'])matParts.push(netM2['18ft']+" 18'");if(netM2['16ft'])matParts.push(netM2['16ft']+" 16'");
  // Date filter for the "by day" view
  const q=document.getElementById('lumber-search-val')?.value||'';
  $mc().innerHTML=`
    ${canO()?'<button class="action-btn btn-primary" onclick="showAddBundle()">+ ADD BUNDLE</button><button class="action-btn btn-secondary" onclick="showNewSale()">SELL LUMBER</button>':''}
    <input class="search-bar" id="lumber-search-val" placeholder="Search type..." value="${q}" oninput="filterLumberDebounced()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <div><div style="font-size:10px;color:var(--text-dim);">Lumber: ${fb(inStock)}</div>${matParts.length?'<div style="font-size:10px;color:var(--text-dim);">Mats: '+matParts.join(' · ')+'</div>':''}</div><button class="export-btn" onclick="exportLumber()">EXPORT</button></div>
    <div id="lumber-list">${renderLumberList(inv,invCount,q)}</div>`;
}
function renderLumberList(inv,invCount,q){
  let types=Object.keys(inv).sort();
  if(q){const ql=q.toLowerCase();types=types.filter(t=>t.toLowerCase().includes(ql));}
  let h='<div class="sh">BY TYPE — CURRENT STOCK</div>';
  if(!types.length)h+='<div class="empty-state">No inventory</div>';
  else h+=types.map(t=>{
    const cnt=invCount[t]||0;
    return'<div class="list-item" onclick="showBundlesByType(\''+esc(t)+'\')"><div class="li-l"><div class="li-t">'+t+'</div><div class="li-s">'+cnt+' bundle'+(cnt!==1?'s':'')+'</div></div><div class="li-r"><div class="li-v">'+fb(inv[t])+'</div><div style="font-size:10px;color:var(--text-dim);margin-top:2px;">tap to edit ›</div></div></div>';
  }).join('');
  return h;
}
let _lumberTimer;
function filterLumberDebounced(){clearTimeout(_lumberTimer);_lumberTimer=setTimeout(()=>{
  const allBundles=S.bundles.filter(b=>b.mill===S.mill&&!b.isBeam&&!b.sold);
  const inv={};const invCount={};
  allBundles.forEach(b=>{
    if(!inv[b.type])inv[b.type]=0;
    if(!invCount[b.type])invCount[b.type]=0;
    inv[b.type]+=b.footage;invCount[b.type]++;
  });
  const q=document.getElementById('lumber-search-val')?.value||'';
  document.getElementById('lumber-list').innerHTML=renderLumberList(inv,invCount,q);
},200);}

// Show all bundles for a specific type, with date filter and delete
function showBundlesByType(type){
  setHdr(type,true);pushS(showLumber);resetMC();

}
function renderBundlesByType(type){
  const allForType=S.bundles.filter(b=>b.mill===S.mill&&!b.isBeam&&b.type===type&&!b.sold);
  // Get all unique dates for this type
  const allDates=[...new Set(allForType.map(b=>b.date))].sort().reverse();
  // Also build a "by day" section

  const totalBF=allForType.reduce((s,b)=>s+b.footage,0);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <div style="font-size:10px;color:var(--text-dim);">${allForType.length} bundles · ${fb(totalBF)} total</div>
    ${canO()?'<button class="action-btn btn-primary" style="width:auto;padding:8px 14px;margin:0;font-size:12px;" onclick="window._addBundleType=\''+esc(type)+'\';showAddBundleForType(\''+esc(type)+'\')">+ ADD</button>':''}
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
    <div style="font-size:10px;color:var(--text-dim);white-space:nowrap;">VIEW BY DAY:</div>
    <input type="date" class="date-input" style="flex:1;" value="${S.lumberDayFilter}" onchange="S.lumberDayFilter=this.value;renderBundlesByType('${esc(type)}')">
  </div>`;
  if(!dayBundles.length){
    h+='<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:12px;">No bundles on '+fd(S.lumberDayFilter)+'</div>';
  } else {
    h+='<div class="sh">'+fd(S.lumberDayFilter)+' — '+fb(dayBundles.reduce((s,b)=>s+b.footage,0))+'</div>';
    h+=dayBundles.map(b=>'<div class="list-item" style="cursor:default"><div class="li-l"><div class="li-t">'+fb(b.footage)+'</div><div class="li-s">'+fd(b.date)+(b.addedBy?' · '+b.addedBy:'')+'</div></div><div class="li-r" style="display:flex;align-items:center;gap:6px;">'+(b.sold?'<span style="color:var(--green);font-size:11px;">SOLD</span>':'')+(canO()?'<button class="del-btn" onclick="delBundleFromType('+b.id+',\''+esc(type)+'\')">✕</button>':'')+'</div></div>').join('');
  }
  h+='<div class="sh">ALL BUNDLES BY DAY</div>';
  if(!allForType.length){h+='<div class="empty-state">No bundles</div>';}
  else{
    // Group by date
    const byDate={};allForType.forEach(b=>{if(!byDate[b.date])byDate[b.date]=[];byDate[b.date].push(b);});
    Object.keys(byDate).sort().reverse().forEach(d=>{
      const dBuns=byDate[d];const dBF=dBuns.reduce((s,b)=>s+b.footage,0);
      h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;" onclick="S.lumberDayFilter=\''+d+'\';renderBundlesByType(\''+esc(type)+'\')"><div style="display:flex;justify-content:space-between;"><span style="font-size:12px;font-weight:600;">'+fd(d)+'</span><span style="color:var(--amber);font-size:12px;font-weight:600;">'+fb(dBF)+'</span></div><div style="font-size:10px;color:var(--text-dim);margin-top:2px;">'+dBuns.length+' bundle'+(dBuns.length!==1?'s':'')+'</div></div>';
    });
  }
  $mc().innerHTML=h;
}
function delBundleFromType(id,type){const b=S.bundles.find(x=>x.id===id);if(b)logActivity('DELETED BUNDLE',b.type+' · '+fb(b.footage)+' · '+mn(b.mill));S.bundles=S.bundles.filter(b=>b.id!==id);save();renderBundlesByType(type);}
function moveBundle(id,type){
  const b=S.bundles.find(x=>x.id===id);if(!b)return;

  logActivity('MOVED TO '+mn(b.mill),type+' · '+fb(b.footage)+' · from '+from);
  save();renderBundlesByType(type);toast('Moved to '+mn(b.mill));
}
function showAddBundleForType(type){
  setHdr('ADD '+type,true);pushS(()=>showBundlesByType(type));resetMC();S.npVal='';
  $mc().innerHTML='<div class="numpad-display"><div class="dl">BOARD FEET</div><div id="b-nv2">0</div></div><div class="numpad">'+[1,2,3,4,5,6,7,8,9].map(n=>'<button class="num-btn" onclick="bNK2(\''+n+'\',\''+esc(type)+'\')">'+n+'</button>').join('')+'<button class="num-btn del" onclick="bNK2(\'del\',\''+esc(type)+'\')">⌫</button><button class="num-btn zero" onclick="bNK2(\'0\',\''+esc(type)+'\')">0</button><button class="num-btn enter" onclick="bNK2(\'enter\',\''+esc(type)+'\')">ADD</button></div>';
}
function bNK2(k,type){
  if(k==='del')S.npVal=S.npVal.slice(0,-1);
  else if(k==='enter'){
    if(!S.npVal)return;
    const b={id:S.bctr++,type:type,footage:parseInt(S.npVal),date:td(),mill:S.mill,sold:false,addedBy:S.user.name};

    save();
    S.npVal='';

    toast('Added '+fb(b.footage));

function exportLumber(){
  const bundles=fdr(S.bundles.filter(b=>b.mill===S.mill&&!b.isBeam),'date',S.fLumber);
  // Summary by type first
  const inv={};const invCount={};
  bundles.filter(b=>!b.sold).forEach(b=>{
    if(!inv[b.type])inv[b.type]=0;
    if(!invCount[b.type])invCount[b.type]=0;
    inv[b.type]+=b.footage;invCount[b.type]++;
  });
  const rows=[];
  // Type summaries
  Object.entries(inv).sort().forEach(([t,bf])=>{
    rows.push([t,invCount[t]+' bundles',bf.toLocaleString()+' bf','IN STOCK','','']);
  });
  rows.push(['---','---','---','---','---','---']);
  // Individual bundles
  [...bundles].reverse().forEach(b=>{
    rows.push([b.type,'1 bundle',b.footage.toLocaleString()+' bf',b.sold?'SOLD':'IN STOCK',fd(b.date)||'no date',b.addedBy||b.by||'']);
  });
  showSheet('LUMBER — '+mn(S.mill),['Type','Bundles','Board Feet','Status','Date','Added By'],rows,'lumber_'+mn(S.mill)+'_'+td()+'.csv');
}

function bNK(k){

let saleCust=null,saleBun=[];
function showNewSale(){setHdr('CUSTOMER',true);pushS(showLumber);resetMC();renderCustSelect();}

function addCustModal(){openModal('<div class="modal-title">ADD CUSTOMER</div><input class="text-input" id="nc-n" placeholder="Name" autocomplete="off"><button class="action-btn btn-primary" onclick="saveNewCust()">ADD</button>');}
function saveNewCust(){const n=document.getElementById('nc-n').value.trim();if(!n)return;S.customers.push(n);save();closeModalForce();selCust(n);}
function selCust(n){saleCust=n;saleBun=[];window._saleOpenTypes={};S.saleTypeF='all';showSelBundles();}
function showSelBundles(){
  setHdr('BUNDLES',true);S.stack=[showNewSale];resetMC();
  if(!window._saleOpenTypes)window._saleOpenTypes={};
  const avail=S.bundles.filter(b=>!b.sold&&b.mill===S.mill&&!b.isBeam);
  const types=[...new Set(avail.map(b=>b.type))].sort();
  const selBF=saleBun.reduce((s,id)=>{const b=S.bundles.find(x=>x.id===id);return s+(b?b.footage:0);},0);

  let h=`<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;">${saleCust}${saleBun.length?' · <span style="color:var(--amber);">'+saleBun.length+' sel · '+fb(selBF)+'</span>':''}</div>`;

  if(!avail.length){h+='<div class="empty-state">No bundles in stock</div>';}
  else{
    types.forEach(t=>{
      const typeBundles=avail.filter(b=>b.type===t);
      const typeSel=typeBundles.filter(b=>saleBun.includes(b.id));
      const typeBF=typeBundles.reduce((s,b)=>s+b.footage,0);
      const typeSelBF=typeSel.reduce((s,b)=>s+b.footage,0);
      const open=!!window._saleOpenTypes[t];
      h+=`<div style="background:var(--surface);border:1px solid ${typeSel.length?'var(--amber)':'var(--border)'};border-radius:8px;margin-bottom:8px;overflow:hidden;">
        <div onclick="window._saleOpenTypes['${esc(t)}']=!window._saleOpenTypes['${esc(t)}'];showSelBundles();" style="padding:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
          <div>
            <div style="font-size:15px;font-weight:600;">${t}</div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${typeBundles.length} bundle${typeBundles.length!==1?'s':''} · ${fb(typeBF)}${typeSel.length?' · <span style="color:var(--amber);">'+typeSel.length+' sel · '+fb(typeSelBF)+'</span>':''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            ${typeSel.length?'<span style="color:var(--amber);font-weight:700;font-size:12px;">'+typeSel.length+'✓</span>':''}
            <span style="color:var(--text-dim);font-size:18px;">${open?'▲':'▼'}</span>
          </div>
        </div>`;
      if(open){
        typeBundles.forEach(b=>{
          const sel=saleBun.includes(b.id);
          h+=`<div onclick="togSB(${b.id})" style="padding:12px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:${sel?'var(--amber-glow)':'var(--surface2)'};">
            <div>
              <div style="font-size:14px;font-weight:600;color:${sel?'var(--amber)':'var(--text)'};">${fb(b.footage)}</div>
              <div style="font-size:11px;color:var(--text-dim);">${fd(b.date)||'no date'}${b.addedBy?' · '+b.addedBy:''}</div>
            </div>
            <div style="font-size:20px;color:${sel?'var(--amber)':'var(--text-dim)'};">${sel?'✓':'○'}</div>
          </div>`;

        h+=`<div onclick="togAllSB('${esc(t)}')" style="padding:10px 14px;border-top:1px solid var(--border);cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--amber);">${allSel?'DESELECT ALL':'SELECT ALL'} ${t}</div>`;
      }

  }

  if(saleBun.length)h+=`<button class="action-btn btn-primary" onclick="showSaleDetails()">NEXT — ${saleBun.length} bundles · ${fb(selBF)}</button>`;

}
function togSB(id){
  if(saleBun.includes(id))saleBun=saleBun.filter(x=>x!==id);
  else saleBun.push(id);
  showSelBundles();
}
function togAllSB(type){
  const typeBundles=S.bundles.filter(b=>!b.sold&&b.mill===S.mill&&b.type===type);

      +'</div>';

  h+='<button class="action-btn btn-primary" onclick="saveSaleNow()">SELL</button>';

function saveSaleNow(){
  if(!saleBun.length)return;
  const tBF=saleBun.reduce((s,id)=>{const b=S.bundles.find(x=>x.id===id);return s+(b?b.footage:0);},0);
  const driver=(document.getElementById('sale-driver')?.value||'').trim();
  const pricePerBF=parseFloat(document.getElementById('sale-price')?.value||0)||0;

  function matNet(millArr){

  (S.matShipments||[]).filter(x=>mills.includes(x.mill)&&x.date===td()).forEach(x=>todayShip[x.matType]=(todayShip[x.matType]||0)+x.count);
  const wkShip={lam:0,'18ft':0,'16ft':0};
  (S.matShipments||[]).filter(x=>mills.includes(x.mill)&&x.date>=weekStart()).forEach(x=>wkShip[x.matType]=(wkShip[x.matType]||0)+x.count);

  let html=`

    html+=`<div class="card" style="padding:10px 14px;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:4px;">

        ${c(wkShip.lam,'var(--mill2)')}
        <div style="font-size:10px;color:var(--text-dim);">18'</div>
        ${c(wk18,'var(--amber)')}${c(wkShip['18ft'],'var(--mill2)')}
        <div style="font-size:10px;color:var(--text-dim);">16'</div>
        ${c(wk16,'var(--amber)')}${c(wkShip['16ft'],'var(--mill2)')}
        <div style="font-size:10px;color:var(--text-dim);font-weight:700;">18+16</div>
        ${c(wkMatCount+(wkMatMPH?'<div style="font-size:8px;color:var(--green);">'+wkMatMPH+'/MH</div>':''),'var(--amber)')}
        ${c((wkShip['18ft']||0)+(wkShip['16ft']||0),'var(--mill2)')}

    <button class="action-btn btn-secondary" style="margin-top:6px;" onclick="showMatShipHistory()">SHIPMENT HISTORY</button>`;

function showManHours(mhKey){
  setHdr('MAN-HOURS',true);pushS(showMats);resetMC();
  const wkStart3=weekStart();
  const getMH=(crew,date)=>(S.manhours||[]).find(h=>h.date===date&&h.mill===mhKey&&h.crew===crew);
  const getWkMH=(crew)=>(S.manhours||[]).filter(h=>h.date>=wkStart3&&h.mill===mhKey&&h.crew===crew).reduce((s,h)=>s+h.hours,0);
  const days=[];const today2=td();
  for(let i=0;i<7;i++){const d=dago(i);if(d<wkStart3)break;days.push(d);}
  // Filter out Sundays (day 0)
  const workDays=days.filter(d=>new Date(d+'T12:00:00').getDay()!==0);

  let h='';

  workDays.forEach(d=>{
    const isToday=d===today2;
    const lamMH=getMH('lam',d)?.hours||'';const matMH=getMH('mat',d)?.hours||'';
    const idSuffix=isToday?'today':d;
    h+='<div class="sh">'+(isToday?'TODAY — ':'')+fd(d)+'</div>';
    h+='<div class="card" style="padding:10px;margin-bottom:6px;">';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
    h+='<div><div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">LAM CREW (MH)</div><input class="text-input" id="mh-lam-'+idSuffix+'" type="number" inputmode="decimal" placeholder="0" value="'+lamMH+'" style="margin:0;"></div>';
    h+='<div><div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">MAT CREW (MH)</div><input class="text-input" id="mh-mat-'+idSuffix+'" type="number" inputmode="decimal" placeholder="0" value="'+matMH+'" style="margin:0;"></div>';
    h+='</div><button class="action-btn '+(isToday?'btn-primary':'btn-secondary')+'" style="margin-top:8px;padding:8px;" onclick="saveMHEntry(\''+mhKey+'\',\''+d+'\')">SAVE '+fd(d)+'</button>';
    h+='</div>';
  });

  const wkLamMH=getWkMH('lam');const wkMatMH=getWkMH('mat');
  if(wkLamMH||wkMatMH){
    h+='<div class="sh">THIS WEEK TOTAL</div>';
    h+='<div class="card" style="padding:10px;">';
    h+='<div class="stat-row"><span class="sl">LAM CREW MH</span><span class="sv">'+wkLamMH+'</span></div>';
    h+='<div class="stat-row"><span class="sl">MAT CREW MH</span><span class="sv">'+wkMatMH+'</span></div>';
    h+='</div>';
  }

  $mc().innerHTML=h;
}

function saveMHEntry(mhKey,date){
  if(!S.manhours)S.manhours=[];
  const isToday=date===td();
  const idSuffix=isToday?'today':date;
  const lamEl=document.getElementById('mh-lam-'+idSuffix);
  const matEl=document.getElementById('mh-mat-'+idSuffix);
  const lamVal=parseFloat(lamEl?.value||0)||0;
  const matVal=parseFloat(matEl?.value||0)||0;
  ['lam','mat'].forEach((crew,ci)=>{
    const val=ci===0?lamVal:matVal;
    const existing=S.manhours.find(h=>h.date===date&&h.mill===mhKey&&h.crew===crew);
    if(existing){existing.hours=val;existing.by=S.user?.name;}
    else if(val>0){S.manhours.push({date,mill:mhKey,crew,hours:val,by:S.user?.name});}
  });
  save();toast('MH saved');showManHours(mhKey);
}

function mtNK(k,type){
  const m=S.mill;
  const getBeam=()=>m===1?S.beamInv:S.beamInvFC;
  const setBeam=(v)=>{if(m===1)S.beamInv=v;else S.beamInvFC=v;};
  const getBolts=()=>m===1?S.bolts:S.boltsFC;
  if(k==='del')S.npVal=S.npVal.slice(0,-1);
  else if(k==='enter'){if(!S.npVal)return;const cnt=parseInt(S.npVal);if(!cnt)return;
    const buildDate=window._matBuildDate||td();
    const bfPer=type==='18ft'?500:type==='16ft'?465:0;const totBF=bfPer*cnt;
    if(type==='lam'){getBolts().lam-=126*cnt;}
    else{getBolts().std-=4*cnt;}
    if(bfPer>0){setBeam(getBeam()-totBF);S.beamLog.push({id:S.blctr++,date:buildDate,mill:m,footage:totBF,type:'used',matType:type,by:S.user.name});}
    S.mats.push({id:S.mctr++,date:buildDate,mill:m,type:type,count:cnt,by:S.user.name});
    logActivity('MATS BUILT',cnt+' '+(type==='lam'?'Laminated':type==="18ft"?"18' Mat":"16' Mat")+' · '+mn(m)+' · '+fd(buildDate));
    save();S.npVal='';toast('Built '+cnt+' on '+fd(buildDate));showMats();return;
  }else{if(S.npVal.length<4)S.npVal+=k;}document.getElementById('mt-nv').textContent=S.npVal||'0';
}

}
function bmNK(k){
  const m=S.mill;
  if(k==='del')S.npVal=S.npVal.slice(0,-1);
  else if(k==='enter'){if(!S.npVal)return;const bf=parseInt(S.npVal);
    if(m===1)S.beamInv+=bf;else S.beamInvFC+=bf;
    S.beamLog.push({id:S.blctr++,date:td(),mill:m,footage:bf,type:'add',by:S.user.name});
    S.bundles.push({id:S.bctr++,type:'Mat Beams',footage:bf,date:td(),mill:m,sold:false,addedBy:S.user.name,isBeam:true});
    save();toast('Added '+fb(bf));showMats();return;
  }else{if(S.npVal.length<6)S.npVal+=k;}document.getElementById('bm-nv').textContent=S.npVal||'0';
}

// ===== MOVE TO OTHER MILL =====
function showMoveToMill(){
  setHdr('MOVE TO OTHER MILL',true);pushS(showMore);resetMC();
  const m=S.mill;const other=m===1?2:1;
  if(!window._mvSel)window._mvSel=[];
  // Lumber bundles
  const bundles=S.bundles.filter(b=>b.mill===m&&!b.sold&&!b.isBeam);
  // Mat counts
  const mc={lam:0,'18ft':0,'16ft':0};
  S.mats.filter(x=>x.mill===m).forEach(x=>mc[x.type]=(mc[x.type]||0)+x.count);
  const shipped={lam:0,'18ft':0,'16ft':0};
  (S.matShipments||[]).filter(x=>x.mill===m).forEach(x=>shipped[x.matType]=(shipped[x.matType]||0)+x.count);
  const net={lam:mc.lam-shipped.lam,'18ft':mc['18ft']-shipped['18ft'],'16ft':mc['16ft']-shipped['16ft']};
  const boltsI=m===1?S.bolts:S.boltsFC;
  const beamI=m===1?S.beamInv:S.beamInvFC;
  const selBF=window._mvSel.reduce((s,id)=>{const b=S.bundles.find(x=>x.id===id);return s+(b?b.footage:0);},0);

  let h=`<div style="font-size:11px;color:var(--amber);margin-bottom:10px;">${mn(m)} → ${mn(other)}</div>`;

  // Lumber bundles — collapsible by type
  if(bundles.length){
    h+='<div class="sh">LUMBER</div>';
    if(window._mvSel.length)h+=`<div style="font-size:11px;color:var(--amber);margin-bottom:8px;">${window._mvSel.length} bundles selected · ${fb(selBF)}</div>`;
    if(!window._mvOpenTypes)window._mvOpenTypes={};
    const types=[...new Set(bundles.map(b=>b.type))].sort();
    types.forEach(t=>{
      const typeBundles=bundles.filter(b=>b.type===t);
      const typeSel=typeBundles.filter(b=>window._mvSel.includes(b.id));
      const typeBF=typeBundles.reduce((s,b)=>s+b.footage,0);
      const typeSelBF=typeSel.reduce((s,b)=>s+b.footage,0);
      const open=!!window._mvOpenTypes[t];
      h+=`<div style="background:var(--surface);border:1px solid ${typeSel.length?'var(--amber)':'var(--border)'};border-radius:8px;margin-bottom:8px;overflow:hidden;">
        <div onclick="window._mvOpenTypes['${esc(t)}']=!window._mvOpenTypes['${esc(t)}'];showMoveToMill();" style="padding:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
          <div>
            <div style="font-size:15px;font-weight:600;">${t}</div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${typeBundles.length} bundle${typeBundles.length!==1?'s':''} · ${fb(typeBF)}${typeSel.length?' · <span style="color:var(--amber);">'+typeSel.length+' sel · '+fb(typeSelBF)+'</span>':''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            ${typeSel.length?'<span style="color:var(--amber);font-weight:700;font-size:12px;">'+typeSel.length+'✓</span>':''}
            <span style="color:var(--text-dim);font-size:18px;">${open?'▲':'▼'}</span>
          </div>
        </div>`;
      if(open){
        typeBundles.forEach(b=>{
          const sel=window._mvSel.includes(b.id);
          h+=`<div onclick="toggleMvBundle(${b.id})" style="padding:12px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:${sel?'var(--amber-glow)':'var(--surface2)'};">
            <div>
              <div style="font-size:14px;font-weight:600;color:${sel?'var(--amber)':'var(--text)'};">${fb(b.footage)}</div>
              <div style="font-size:11px;color:var(--text-dim);">${fd(b.date)||'no date'}${b.addedBy?' · '+b.addedBy:''}</div>
            </div>
            <div style="font-size:20px;color:${sel?'var(--amber)':'var(--text-dim)'};">${sel?'✓':'○'}</div>
          </div>`;
        });
        const allSel=typeBundles.every(b=>window._mvSel.includes(b.id));
        h+=`<div onclick="toggleMvAllType('${esc(t)}')" style="padding:10px 14px;border-top:1px solid var(--border);cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--amber);">${allSel?'DESELECT ALL':'SELECT ALL'} ${t}</div>`;
      }
      h+='</div>';
    });
  }

  h+='<div class="sh">MATS</div>';
  [['lam','Laminated',net.lam],['18ft',"18' Mat",net['18ft']],['16ft',"16' Mat",net['16ft']]].forEach(([k,label,avail])=>{
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <div style="font-size:13px;font-weight:600;">${label} <span style="font-size:10px;color:var(--text-dim);">${avail} avail</span></div>
      <input class="text-input" id="mv-${k}" type="number" inputmode="numeric" placeholder="Qty" style="width:110px;margin:0;padding:10px;">
    </div>`;
  });

  h+='<div class="sh">BOLTS & BEAMS</div>';
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
    <div style="font-size:13px;font-weight:600;">Lam Bolts <span style="font-size:10px;color:var(--text-dim);">${boltsI.lam}</span></div>
    <input class="text-input" id="mv-lb" type="number" inputmode="numeric" placeholder="Qty" style="width:110px;margin:0;padding:10px;">
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
    <div style="font-size:13px;font-weight:600;">Big Bolts <span style="font-size:10px;color:var(--text-dim);">${boltsI.std}</span></div>
    <input class="text-input" id="mv-sb" type="number" inputmode="numeric" placeholder="Qty" style="width:110px;margin:0;padding:10px;">
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <div style="font-size:13px;font-weight:600;">Beams <span style="font-size:10px;color:var(--text-dim);">${fb(beamI)}</span></div>
    <input class="text-input" id="mv-bm" type="number" inputmode="numeric" placeholder="BF" style="width:110px;margin:0;padding:10px;">
  </div>
  <button class="action-btn btn-primary" onclick="confirmMoveToMill()">MOVE TO ${mn(other)}</button>`;
  $mc().innerHTML=h;
}
function toggleMvBundle(id){
  if(!window._mvSel)window._mvSel=[];
  if(window._mvSel.includes(id))window._mvSel=window._mvSel.filter(x=>x!==id);
  else window._mvSel.push(id);
  showMoveToMill();
}
function toggleMvAllType(type){
  const m=S.mill;
  const typeBundles=S.bundles.filter(b=>b.mill===m&&!b.sold&&!b.isBeam&&b.type===type);
  const allSel=typeBundles.every(b=>window._mvSel.includes(b.id));
  if(allSel)window._mvSel=window._mvSel.filter(id=>!typeBundles.find(b=>b.id===id));
  else typeBundles.forEach(b=>{if(!window._mvSel.includes(b.id))window._mvSel.push(b.id);});
  showMoveToMill();
}
function confirmMoveToMill(){
  const m=S.mill;const other=m===1?2:1;
  const srcBolts=m===1?S.bolts:S.boltsFC;
  const dstBolts=m===1?S.boltsFC:S.bolts;
  const moved=[];

  // Move selected bundles whole
  if(window._mvSel&&window._mvSel.length){
    const byType={};
    window._mvSel.forEach(id=>{
      const b=S.bundles.find(x=>x.id===id);
      if(!b)return;
      b.mill=other;
      if(!byType[b.type])byType[b.type]=0;
      byType[b.type]+=b.footage;
    });
    Object.entries(byType).forEach(([t,bf])=>moved.push(fb(bf)+' '+t));
    window._mvSel=[];
  }

  // Move mats
  const lamQ=parseInt(document.getElementById('mv-lam')?.value)||0;
  const f18Q=parseInt(document.getElementById('mv-18ft')?.value)||0;
  const f16Q=parseInt(document.getElementById('mv-16ft')?.value)||0;
  if(lamQ){S.mats.push({id:S.mctr++,date:td(),mill:other,type:'lam',count:lamQ,by:S.user.name,transfer:true});S.mats.push({id:S.mctr++,date:td(),mill:m,type:'lam',count:-lamQ,by:S.user.name,transfer:true});moved.push(lamQ+' lam mats');}
  if(f18Q){S.mats.push({id:S.mctr++,date:td(),mill:other,type:'18ft',count:f18Q,by:S.user.name,transfer:true});S.mats.push({id:S.mctr++,date:td(),mill:m,type:'18ft',count:-f18Q,by:S.user.name,transfer:true});moved.push(f18Q+" 18' mats");}
  if(f16Q){S.mats.push({id:S.mctr++,date:td(),mill:other,type:'16ft',count:f16Q,by:S.user.name,transfer:true});S.mats.push({id:S.mctr++,date:td(),mill:m,type:'16ft',count:-f16Q,by:S.user.name,transfer:true});moved.push(f16Q+" 16' mats");}

  // Move bolts & beams
  const lbQ=parseInt(document.getElementById('mv-lb')?.value)||0;
  const sbQ=parseInt(document.getElementById('mv-sb')?.value)||0;
  const bmQ=parseInt(document.getElementById('mv-bm')?.value)||0;
  if(lbQ){srcBolts.lam-=lbQ;dstBolts.lam+=lbQ;moved.push(lbQ+' lam bolts');}
  if(sbQ){srcBolts.std-=sbQ;dstBolts.std+=sbQ;moved.push(sbQ+' big bolts');}
  if(bmQ){if(m===1){S.beamInv-=bmQ;S.beamInvFC+=bmQ;}else{S.beamInvFC-=bmQ;S.beamInv+=bmQ;}moved.push(fb(bmQ)+' beams');}

  if(!moved.length){toast('Nothing to move');return;}
  logActivity('MOVED TO '+mn(other),moved.join(' · ')+' · from '+mn(m));
  save();toast('Moved to '+mn(other));showMore();
}

function pickShipMatType(t){
  window._shipMatType=t;
  ['lam','18ft','16ft'].forEach(x=>document.getElementById('smt-'+x).classList.toggle('selected',x===t));
}
function shipMatNK(k){
  if(k==='del')S.npVal=S.npVal.slice(0,-1);
  else if(k==='enter'){
    const cnt=parseInt(S.npVal)||0;
    const cust=(document.getElementById('ship-cust')?.value||'').trim();
    const date=window._shipMatDate||td();
    if(!window._shipMatType){toast('Pick a mat type');return;}
    if(!cnt){toast('Enter quantity');return;}
    if(!cust){toast('Enter customer');return;}
    // Check available stock
    const m=S.mill;
    const mc={lam:0,'18ft':0,'16ft':0};
    S.mats.filter(x=>x.mill===m).forEach(x=>mc[x.type]=(mc[x.type]||0)+x.count);
    const shipped={lam:0,'18ft':0,'16ft':0};
    (S.matShipments||[]).filter(x=>x.mill===m).forEach(x=>shipped[x.matType]=(shipped[x.matType]||0)+x.count);
    const avail=mc[window._shipMatType]-shipped[window._shipMatType];
    if(cnt>avail){toast('Only '+avail+' available');return;}
    if(!S.matShipments)S.matShipments=[];
    const typeLabel=window._shipMatType==='lam'?'Laminated':window._shipMatType==="18ft"?"18' Mat":"16' Mat";
    S.matShipments.push({id:S.msctr++,date:date,mill:m,matType:window._shipMatType,count:cnt,customer:cust,by:S.user.name});
    if(!S.customers.includes(cust)){S.customers.push(cust);}
    logActivity('MATS SHIPPED',cnt+' '+typeLabel+' → '+cust+' · '+mn(m));
    save();
    openModal('<div class="modal-title">SHIPPED</div><div style="color:var(--text-dim);font-size:12px;margin-bottom:12px;">'+typeLabel+' × '+cnt+'<br>'+cust+' · '+fd(date)+'</div><button class="action-btn btn-primary" onclick="closeModalForce();showShipMats()">SHIP MORE</button><button class="action-btn btn-secondary" onclick="closeModalForce();showMats()">DONE</button>');
    return;
  }else{if(S.npVal.length<4)S.npVal+=k;}
  const el=document.getElementById('ship-nv');if(el)el.textContent=S.npVal||'0';
}
function showMatShipHistory(){
  setHdr('SHIPMENTS',true);pushS(showMats);resetMC();

function delMatShip(id){S.matShipments=S.matShipments.filter(x=>x.id!==id);save();showMatShipHistory();toast('Deleted');}

function savePhysInv(){
  const m=S.mill;const calc={};S.bundles.filter(b=>b.mill===m&&!b.sold&&!b.isBeam).forEach(b=>{if(!calc[b.type])calc[b.type]=0;calc[b.type]+=b.footage;});
  const beamI=m===1?S.beamInv:S.beamInvFC;const boltsI=m===1?S.bolts:S.boltsFC;
  // Net mat counts
  const mc2={lam:0,'18ft':0,'16ft':0};
  S.mats.filter(x=>x.mill===m).forEach(x=>mc2[x.type]=(mc2[x.type]||0)+x.count);
  const shipped={lam:0,'18ft':0,'16ft':0};
  (S.matShipments||[]).filter(x=>x.mill===m).forEach(x=>shipped[x.matType]=(shipped[x.matType]||0)+x.count);
  const netMats={lam:mc2.lam-shipped.lam,'18ft':mc2['18ft']-shipped['18ft'],'16ft':mc2['16ft']-shipped['16ft']};

  const items=[];document.querySelectorAll('[data-inv-type]').forEach(el=>{const t=el.dataset.invType;const v=parseInt(el.value);if(!isNaN(v))items.push({type:t,counted:v,calculated:calc[t]||0,diff:v-(calc[t]||0)});});
  const bmV=parseInt(document.getElementById('inv-bm')?.value);
  const lbV=parseInt(document.getElementById('inv-lb')?.value);
  const sbV=parseInt(document.getElementById('inv-sb')?.value);
  const lamV=parseInt(document.getElementById('inv-lam')?.value);
  const f18V=parseInt(document.getElementById('inv-18ft')?.value);
  const f16V=parseInt(document.getElementById('inv-16ft')?.value);

  window._invRec={items,bm:isNaN(bmV)?null:bmV,lb:isNaN(lbV)?null:lbV,sb:isNaN(sbV)?null:sbV,lam:isNaN(lamV)?null:lamV,f18:isNaN(f18V)?null:f18V,f16:isNaN(f16V)?null:f16V,mill:m,netMats};
  S.invCounts.push({id:S.ictr++,date:td(),mill:m,...window._invRec,by:S.user.name});save();

  let h='<div class="modal-title">COMPARISON</div>';

}
function overrideInv(){
  const r=window._invRec;if(!r)return;
  const m=r.mill;
  const lines=[];
  // Lumber bundles
  r.items.forEach(it=>{
    if(it.diff!==0){
      S.bundles=S.bundles.filter(b=>!(b.type===it.type&&b.mill===m&&!b.sold));
      if(it.counted>0)S.bundles.push({id:S.bctr++,type:it.type,footage:it.counted,date:td(),mill:m,sold:false,addedBy:'COUNT'});
      lines.push(it.type+': '+it.calculated+' → '+it.counted+' bf');
    }
  });
  // Mats — add adjustment entry to keep production history intact
  if(r.lam!==null){const diff=r.lam-r.netMats.lam;if(diff!==0){S.mats.push({id:S.mctr++,date:td(),mill:m,type:'lam',count:diff,by:'COUNT',adjustment:true});lines.push('Lam mats: '+r.netMats.lam+' → '+r.lam);}}
  if(r.f18!==null){const diff=r.f18-r.netMats['18ft'];if(diff!==0){S.mats.push({id:S.mctr++,date:td(),mill:m,type:'18ft',count:diff,by:'COUNT',adjustment:true});lines.push("18' mats: "+r.netMats['18ft']+' → '+r.f18);}}
  if(r.f16!==null){const diff=r.f16-r.netMats['16ft'];if(diff!==0){S.mats.push({id:S.mctr++,date:td(),mill:m,type:'16ft',count:diff,by:'COUNT',adjustment:true});lines.push("16' mats: "+r.netMats['16ft']+' → '+r.f16);}}
  // Beams/bolts
  const boltsI=m===1?S.bolts:S.boltsFC;
  const beamI=m===1?S.beamInv:S.beamInvFC;
  if(r.bm!==null&&r.bm!==beamI){lines.push('Beams: '+beamI+' → '+r.bm+' bf');}
  if(r.lb!==null&&r.lb!==boltsI.lam){lines.push('Lam bolts: '+boltsI.lam+' → '+r.lb);}
  if(r.sb!==null&&r.sb!==boltsI.std){lines.push('Big bolts: '+boltsI.std+' → '+r.sb);}
  if(m===1){if(r.bm!==null)S.beamInv=r.bm;if(r.lb!==null)S.bolts.lam=r.lb;if(r.sb!==null)S.bolts.std=r.sb;}
  else{if(r.bm!==null)S.beamInvFC=r.bm;if(r.lb!==null)S.boltsFC.lam=r.lb;if(r.sb!==null)S.boltsFC.std=r.sb;}
  logActivity('INVENTORY COUNT',mn(m)+' · '+(lines.length?lines.join(' · '):'no changes'));
  save();closeModalForce();toast('Overridden');showMore();
}
