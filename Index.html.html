const ALL_ACTIONS=['LOAD SAVED','SAW LOG','BUNDLE ADDED','SALE','MATS BUILT','MATS SHIPPED','MARKED PAID','MARKED UNPAID','MOVED TO GR','MOVED TO FC','DELETED LOG','DELETED LOAD','DELETED SAW LOG','DELETED BUNDLE'];
const ACTION_COLORS={'LOAD SAVED':'var(--amber)','SAW LOG':'var(--mill2)','BUNDLE ADDED':'var(--green)','SALE':'var(--green)','MATS BUILT':'var(--amber)','MATS SHIPPED':'var(--mill2)','MARKED PAID':'var(--green)','MARKED UNPAID':'var(--red)','MOVED TO GR':'var(--mill1)','MOVED TO FC':'var(--mill2)','DELETED LOG':'var(--red)','DELETED LOAD':'var(--red)','DELETED SAW LOG':'var(--red)','DELETED BUNDLE':'var(--red)'};

function showActivityLog(){
  window._actActions=new Set(ALL_ACTIONS);
  window._actDate='all';
  window._actPerson='all';
  window._actActionsOpen=false;
  renderActivityLog();
}
// Helper functions called from onclick — avoids scope issues with inline JS
function actSetDate(v){window._actDate=v;renderActivityLog();}
function actSetPerson(v){window._actPerson=v;renderActivityLog();}
function actToggleOpen(){window._actActionsOpen=!window._actActionsOpen;renderActivityLog();}
function actSelectAll(){
  const used=[...new Set((S.activityLog||[]).map(e=>e.action).filter(Boolean))];
  window._actActions=new Set(used.length?used:ALL_ACTIONS);
  renderActivityLog();
}
function actSelectNone(){window._actActions=new Set();renderActivityLog();}
function actToggle(a){
  if(!window._actActions)window._actActions=new Set(ALL_ACTIONS);
  if(window._actActions.has(a))window._actActions.delete(a);
  else window._actActions.add(a);
  renderActivityLog();
}
function renderActivityLog(){
  setHdr('ACTIVITY LOG',true);pushS(showMore);resetMC();
  if(!S.activityLog)S.activityLog=[];
  if(!window._actActions)window._actActions=new Set(ALL_ACTIONS);
  if(!window._actDate)window._actDate='all';
  if(!window._actPerson)window._actPerson='all';

  const allUsers=[...new Set(S.activityLog.map(e=>e.by))].filter(Boolean).sort();
  const usedActions=[...new Set(S.activityLog.map(e=>e.action))].filter(Boolean).sort();
  const shownCount=usedActions.filter(a=>window._actActions.has(a)).length;

  let log=[...S.activityLog].reverse();
  if(window._actDate==='today')log=log.filter(e=>e.date===td());
  else if(window._actDate==='week')log=log.filter(e=>e.date>=weekStart());
  if(window._actPerson!=='all')log=log.filter(e=>e.by===window._actPerson);
  log=log.filter(e=>window._actActions.has(e.action));

  const actOpen=!!window._actActionsOpen;
  let h='';

  // Date filter
  h+='<div class="filter-row">';
  [['all','All'],['today','Today'],['week','7d']].forEach(([k,l])=>{
    h+='<button class="filter-chip'+(window._actDate===k?' active':'')+'" onclick="actSetDate(\''+k+'\')">'+l+'</button>';
  });
  h+='</div>';

  // Person filter
  if(allUsers.length>0){
    h+='<div class="filter-row"><button class="filter-chip'+(window._actPerson==='all'?' active':'')+'" onclick="actSetPerson(\'all\')">All</button>';
    allUsers.forEach(u=>{
      h+='<button class="filter-chip'+(window._actPerson===u?' active':'')+'" onclick="actSetPerson(\''+esc(u)+'\')">'+u.split(' ')[0]+'</button>';
    });
    h+='</div>';
  }

  // Action filter collapsible
  h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;">';
  h+='<div onclick="actToggleOpen()" style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">';
  h+='<div style="font-size:13px;font-weight:600;">FILTER BY ACTION <span style="font-size:10px;color:var(--text-dim);">'+shownCount+'/'+usedActions.length+' shown</span></div>';
  h+='<span style="color:var(--text-dim);font-size:16px;">'+(actOpen?'▲':'▼')+'</span></div>';
  if(actOpen){
    h+='<div style="padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:8px;">';
    h+='<button onclick="actSelectAll()" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--amber);font-family:\'IBM Plex Mono\',monospace;font-size:11px;font-weight:600;cursor:pointer;">ALL</button>';
    h+='<button onclick="actSelectNone()" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:\'IBM Plex Mono\',monospace;font-size:11px;font-weight:600;cursor:pointer;">NONE</button>';
    h+='</div>';
    usedActions.forEach(a=>{
      const on=window._actActions.has(a);
      const col=ACTION_COLORS[a]||'var(--text-dim)';
      h+='<div onclick="actToggle(\''+esc(a)+'\')" style="padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:'+(on?'var(--amber-glow)':'var(--surface2)')+';">';
      h+='<span style="font-size:12px;font-weight:700;color:'+(on?col:'var(--text-dim)')+';">'+a+'</span>';
      h+='<span style="font-size:18px;color:'+(on?'var(--amber)':'var(--text-dim)')+';">'+(on?'✓':'○')+'</span></div>';
    });
  }
  h+='</div>';

  h+='<div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">'+log.length+' entries</div>';
  if(!log.length){
    h+='<div class="empty-state">No activity matching filters</div>';
  }else{
    log.forEach(e=>{
      const col=ACTION_COLORS[e.action]||'var(--text-dim)';
      h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
      h+='<span style="font-size:11px;font-weight:700;color:'+col+';letter-spacing:1px;">'+e.action+'</span>';
      h+='<span style="font-size:10px;color:var(--text-dim);">'+formatTS(e.ts)+'</span></div>';
      h+='<div style="font-size:13px;font-weight:600;margin-bottom:2px;">'+e.detail+'</div>';
      h+='<div style="font-size:10px;color:var(--text-dim);">'+e.by+'</div></div>';
    });
  }
  $mc().innerHTML=h;
}
function sfReport(r){S.fReport=r;showReports();}
function showReports(){
  setHdr('REPORTS',true);pushS(showMore);resetMC();
  S.screen='reports';
  if(!S.fReport)S.fReport='week';
  if(!window._rptFields)window._rptFields=new Set(['loads','footage','cost','sawed','lumber','yield','sold','revenue','matsLam','mats18','mats16']);
  if(!window._rptFrom)window._rptFrom=weekStart();
  if(!window._rptTo)window._rptTo=td();

  const rptMills=window._matsBoth?[1,2]:[S.mill];
  const millLabel=window._matsBoth?'GR + FC':mn(S.mill);

  const toDate=window._rptCustom?window._rptTo:null;
  function fdrC(items,f){return window._rptCustom?items.filter(i=>i[f]>=fromDate&&i[f]<=toDate):fdr(items,f,S.fReport);}

    if(S.fReport==='month'){const d=new Date();d.setDate(d.getDate()-30);return fd(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'))+' \u2013 '+fd(todayStr);}
    if(S.fReport==='quarter'){const d=new Date();d.setDate(d.getDate()-90);return fd(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'))+' \u2013 '+fd(todayStr);}
    return 'All Time';
  }
  const dateLabel=rptDateLabel();

  const tu=fdrC(S.takeup.filter(t=>rptMills.includes(t.mill)),'date');
  const bn=fdrC(S.bundles.filter(b=>rptMills.includes(b.mill)&&!b.isBeam),'date');
  const sl=fdrC(S.sales.filter(s=>rptMills.includes(s.mill)),'date');
  const lds=fdrC(S.loads.filter(l=>rptMills.includes(l.mill)),'date');
  const matsFilt=fdrC(S.mats.filter(x=>rptMills.includes(x.mill)&&!x.transfer),'date');
  const shipsFilt=fdrC((S.matShipments||[]).filter(x=>rptMills.includes(x.mill)),'date');

  const tuBF=tu.reduce((s,t)=>s+t.footage,0);
  const prodBF=bn.reduce((s,b)=>s+b.footage,0);

  const slVal=sl.reduce((s,x)=>s+x.total,0);
  const ldsBF=lds.reduce((s,l)=>s+l.logs.reduce((a,lg)=>a+lg.footage,0),0);
  const ldsVal=lds.reduce((s,l)=>s+l.logs.reduce((a,lg)=>a+(lg.footage*lg.price),0),0);
  const yld=tuBF>0?((prodBF/tuBF)*100).toFixed(1)+'%':'\u2014';
  const matsLam=matsFilt.filter(x=>x.type==='lam').reduce((s,x)=>s+x.count,0);
  const mats18=matsFilt.filter(x=>x.type==='18ft').reduce((s,x)=>s+x.count,0);
  const mats16=matsFilt.filter(x=>x.type==='16ft').reduce((s,x)=>s+x.count,0);
  const shipLam=shipsFilt.filter(x=>x.matType==='lam').reduce((s,x)=>s+x.count,0);
  const ship18=shipsFilt.filter(x=>x.matType==='18ft').reduce((s,x)=>s+x.count,0);
  const ship16=shipsFilt.filter(x=>x.matType==='16ft').reduce((s,x)=>s+x.count,0);

  // Inventory (current, across selected mills)

  const lumInv={};const lumCnt={};
  allBun.forEach(b=>{if(!lumInv[b.type])lumInv[b.type]=0;if(!lumCnt[b.type])lumCnt[b.type]=0;lumInv[b.type]+=b.footage;lumCnt[b.type]++;});

  const boltsI=rptMills.includes(1)&&rptMills.includes(2)?{lam:S.bolts.lam+S.boltsFC.lam,std:S.bolts.std+S.boltsFC.std}:rptMills.includes(1)?S.bolts:S.boltsFC;
  const matMC={lam:0,'18ft':0,'16ft':0};S.mats.filter(x=>rptMills.includes(x.mill)).forEach(x=>matMC[x.type]=(matMC[x.type]||0)+x.count);
  const matSH={lam:0,'18ft':0,'16ft':0};(S.matShipments||[]).filter(x=>rptMills.includes(x.mill)).forEach(x=>matSH[x.matType]=(matSH[x.matType]||0)+x.count);
  const matNet={lam:matMC.lam-matSH.lam,'18ft':matMC['18ft']-matSH['18ft'],'16ft':matMC['16ft']-matSH['16ft']};

  h+='</div>';
  if(window._rptCustom){
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">'
      +'<div><div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">FROM</div><input type="date" class="date-input" style="width:100%;" value="'+window._rptFrom+'" onchange="window._rptFrom=this.value;showReports()"></div>'
      +'<div><div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">TO</div><input type="date" class="date-input" style="width:100%;" value="'+window._rptTo+'" onchange="window._rptTo=this.value;showReports()"></div>'
      +'</div>';
  }

  h+='<div class="sh">INCLUDE IN REPORT</div>';
  groups.forEach(g=>{
    if(!g.fields.length)return;
    const open=!!window._rptCatOpen[g.key];
    const anyOn=g.fields.some(([k])=>F.has(k));
    const activeCount=g.fields.filter(([k])=>F.has(k)).length;
    h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden;">';
    h+='<div onclick="window._rptCatOpen[\''+g.key+'\']=!window._rptCatOpen[\''+g.key+'\'];showReports()" style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">'
      +'<div style="display:flex;align-items:center;gap:10px;">'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+(anyOn?'var(--amber)':'var(--border)')+'"></div>'
      +'<div><div style="font-size:13px;font-weight:700;">'+g.label+'</div>'
      +'<div style="font-size:10px;color:var(--text-dim);">'+activeCount+'/'+g.fields.length+' selected</div></div>'
      +'</div>'
      +'<span style="color:var(--text-dim);font-size:16px;">'+(open?'\u25b2':'\u25bc')+'</span>'
      +'</div>';
    if(open){
      h+='<div style="padding:6px 14px;border-top:1px solid var(--border);display:flex;gap:8px;">'
        +'<button onclick="event.stopPropagation();rptSelectCat(\''+g.key+'\',true)" style="flex:1;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--amber);font-family:\'IBM Plex Mono\',monospace;font-size:11px;font-weight:600;cursor:pointer;">ALL</button>'
        +'<button onclick="event.stopPropagation();rptSelectCat(\''+g.key+'\',false)" style="flex:1;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:\'IBM Plex Mono\',monospace;font-size:11px;font-weight:600;cursor:pointer;">NONE</button>'
        +'</div>';
      g.fields.forEach(([k,l])=>{
        const on=F.has(k);
        h+='<div onclick="event.stopPropagation();window._rptFields.'+(on?'delete':'add')+'(\''+k+'\');showReports()" style="padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:'+(on?'var(--amber-glow)':'var(--surface2)')+';">'
          +'<span style="font-size:12px;color:'+(on?'var(--amber)':'var(--text-dim)')+';">'+l+'</span>'
          +'<span style="font-size:16px;color:'+(on?'var(--amber)':'var(--text-dim)')+';">'+(on?'\u2713':'\u25cb')+'</span>'
          +'</div>';
      });
    }
    h+='</div>';
  });

  h+='<div class="card" id="rpt-card">';
  h+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">'
    +'<div class="card-title" style="margin:0;">'+millLabel+'</div>'
    +'<div style="font-size:11px;color:var(--text-dim);">'+dateLabel+'</div>'
    +'</div>';
  groups.forEach(g=>{
    const visRows=g.fields.filter(([k])=>F.has(k));
    if(!visRows.length)return;

    if(g.key==='mats'){
      const hasBlt=visRows.some(([k])=>k.startsWith('mats'));
      const hasSh=visRows.some(([k])=>k.startsWith('ship'));
      const hasInv=visRows.some(([k])=>k.startsWith('inv_lam')||k==='inv_18mat'||k==='inv_16mat');
      const hasExtra=visRows.some(([k])=>k==='inv_beams'||k==='inv_lamBolt'||k==='inv_bigBolt');

      h+='<div style="font-size:9px;color:var(--text-dim);letter-spacing:1px;font-weight:700;margin:10px 0 4px;">MATS</div>';

      if(hasBlt||hasSh||hasInv){
        const cols=[];
        if(hasBlt)cols.push('BUILT');if(hasSh)cols.push('SHIPPED');if(hasInv)cols.push('INV');
        h+='<div style="display:grid;grid-template-columns:1fr '+cols.map(()=>'1fr').join(' ')+';gap:4px;margin-bottom:4px;">';
        h+='<div></div>';
        cols.forEach(c=>h+='<div style="font-size:9px;font-weight:700;color:var(--text-dim);text-align:center;">'+c+'</div>');
        h+='</div>';
        const fieldMap={};visRows.forEach(([k,,v])=>fieldMap[k]=v);
        [['Lam','matsLam','shipLam','inv_lamMat'],["18'","mats18",'ship18','inv_18mat'],["16'","mats16",'ship16','inv_16mat']].forEach(([label,bk,sk,ik])=>{
          // show row if at least one of the selected columns involves this type
          const show=(hasBlt&&F.has(bk))||(hasSh&&F.has(sk))||(hasInv&&F.has(ik));
          if(!show)return;
          h+='<div style="display:grid;grid-template-columns:1fr '+cols.map(()=>'1fr').join(' ')+';gap:4px;border-top:1px solid var(--border);padding:5px 0;align-items:center;">';
          h+='<div style="font-size:11px;color:var(--text-dim);">'+label+'</div>';
          if(hasBlt)h+='<div style="text-align:center;font-weight:700;font-size:13px;">'+(F.has(bk)?fieldMap[bk]:'—')+'</div>';
          if(hasSh)h+='<div style="text-align:center;font-weight:700;font-size:13px;">'+(F.has(sk)?fieldMap[sk]:'—')+'</div>';
          if(hasInv)h+='<div style="text-align:center;font-weight:700;font-size:13px;">'+(F.has(ik)?fieldMap[ik]:'—')+'</div>';
          h+='</div>';
        });
      }
      if(hasExtra){
        [['inv_beams','BEAM STOCK'],['inv_lamBolt','LAM BOLTS'],['inv_bigBolt','BIG BOLTS']].forEach(([k,l])=>{
          if(!F.has(k))return;
          const v=visRows.find(([fk])=>fk===k)?.[2]||'—';
          h+='<div class="stat-row"><span class="sl">'+l+'</span><span class="sv">'+v+'</span></div>';
        });
      }
    } else {
      h+='<div style="font-size:9px;color:var(--text-dim);letter-spacing:1px;font-weight:700;margin:10px 0 4px;">'+g.label+'</div>';
      visRows.forEach(([k,l,v])=>{h+='<div class="stat-row"><span class="sl">'+l+'</span><span class="sv">'+v+'</span></div>';});
    }
  });
  h+='</div>';

  h+='<button class="action-btn btn-primary" onclick="printReport()">SAVE AS PDF</button>';
  h+='<div style="display:flex;gap:6px;"><button class="export-btn" style="flex:1;justify-content:center;" onclick="exportLoads()">LOADS</button><button class="export-btn" style="flex:1;justify-content:center;" onclick="exportLumber()">LUMBER</button><button class="export-btn" style="flex:1;justify-content:center;" onclick="exportSales()">SALES</button></div>';

  $mc().innerHTML=h;
}

function rptSelectCat(catKey,on){
  const groups={
    prod:['loads','footage','cost','sawed','lumber','yield','sold','revenue'],
    mats:['matsLam','mats18','mats16','shipLam','ship18','ship16','inv_lamMat','inv_18mat','inv_16mat','inv_beams','inv_lamBolt','inv_bigBolt'],
  };
  if(catKey==='lumInv'){
    [...window._rptFields].filter(k=>k.startsWith('lum_')).forEach(k=>window._rptFields.delete(k));
    if(on){S.bundles.filter(b=>b.mill===S.mill&&!b.sold&&!b.isBeam).forEach(b=>window._rptFields.add('lum_'+b.type));}
  }else{(groups[catKey]||[]).forEach(k=>{on?window._rptFields.add(k):window._rptFields.delete(k);});}
  showReports();
}

function printReport(){
  const card=document.getElementById('rpt-card');

    .replace(/<button[^>]*>.*?<\/button>/gs,'')
    .replace(/class="card-title"[^>]*>/g,'style="font-size:22px;font-weight:700;letter-spacing:1px;margin:0 0 4px;">')
    .replace(/class="stat-row"/g,'style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid #eee;"')
    .replace(/class="sl"/g,'style="color:#555;"')
    .replace(/class="sv"/g,'style="font-weight:700;"')
    .replace(/var\(--border\)/g,'#ddd')
    .replace(/var\(--text-dim\)/g,'#888')
    .replace(/var\(--amber\)/g,'#b87800')
    .replace(/var\(--green\)/g,'#2a7a2a');

  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Mill Mate Report — ${millLabel}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}

    .report-title{font-size:24px;font-weight:700;letter-spacing:2px;}
    .report-sub{font-size:12px;color:#666;margin-top:3px;}
    .report-date{text-align:right;font-size:13px;color:#555;}
    .section-label{font-size:9px;color:#888;letter-spacing:1px;font-weight:700;text-transform:uppercase;margin:16px 0 6px;border-bottom:1px solid #ccc;padding-bottom:3px;}
    .footer{margin-top:28px;border-top:1px solid #ccc;padding-top:12px;font-size:10px;color:#aaa;text-align:center;}
    @media print{@page{size:auto;margin:12mm;}body{padding:0;}button{display:none;}}
  </style></head><body>
  <div class="report-header">
    <div><div class="report-title">MILL MATE</div><div class="report-sub">${millLabel}</div></div>
    <div class="report-date">${dateLabel}<br>Printed ${fd(td())}</div>

  </body></html>`);
  w.document.close();

// ===== LOGGER PAYMENTS =====
function showLoggerPay(){setHdr('LOGGER PAY',true);pushS(showMore);resetMC();
  const rows=S.loggers.map(l=>{const up=S.loads.filter(ld=>ld.logger===l&&!ld.paid);const t=up.reduce((s,ld)=>s+ld.logs.reduce((a,lg)=>a+(lg.footage*lg.price),0),0);return{name:l,up:up.length,owed:t};});
  rows.sort((a,b)=>b.up-a.up||b.owed-a.owed);
  const withUnpaid=rows.filter(r=>r.up>0);
  let h='';
  if(withUnpaid.length){
    h+='<div class="sh">UNPAID</div>';
    h+=withUnpaid.map(r=>'<div class="list-item" onclick="showLoggerWk(\''+esc(r.name)+'\')"><div class="li-l"><div class="li-t">'+r.name+'</div><div class="li-s" style="color:var(--red);">'+r.up+' unpaid load'+(r.up!==1?'s':'')+'</div></div><div class="li-r"><div class="li-v">'+fm(r.owed)+'</div></div></div>').join('');
  }else{
    h='<div class="empty-state">No unpaid loads</div>';
  }
  $mc().innerHTML=h;
}
function showLoggerWk(ln){setHdr(ln.split(' ')[0].toUpperCase(),true);pushS(showLoggerPay);resetMC();
  const allLds=S.loads.filter(l=>l.logger===ln);
  const up=allLds.filter(l=>!l.paid);
  const owed=up.reduce((s,l)=>s+l.logs.reduce((a,lg)=>a+(lg.footage*lg.price),0),0);
  $mc().innerHTML='<div class="card"><div class="card-title">'+ln+'</div><div class="stat-row"><span class="sl">UNPAID LOADS</span><span class="sv">'+up.length+'</span></div><div class="stat-row"><span class="sl">OWED</span><span class="sv">'+fm(owed)+'</span></div></div>'
    +(up.length?'<button class="action-btn btn-success" onclick="markLoggerPd(\''+esc(ln)+'\')">MARK ALL PAID — '+fm(owed)+'</button>':'')
    +'<button class="action-btn btn-secondary" onclick="exportLoggerLoads(\''+esc(ln)+'\')">EXPORT '+ln.split(' ')[0].toUpperCase()+' LOADS</button>'
    +'<div class="sh">UNPAID LOADS</div>'
    +(up.length?up.map(l=>{const t=l.logs.reduce((s,lg)=>s+(lg.footage*lg.price),0);return'<div class="list-item" onclick="showLoadDetail('+l.id+')"><div class="li-l"><div class="li-t">'+fd(l.date)+' · '+mn(l.mill)+'</div><div class="li-s">'+l.logs.length+' logs</div></div><div class="li-r"><div class="li-v">'+fm(t)+'</div></div></div>';}).join(''):'<div class="empty-state">No unpaid loads</div>');
}
function exportLoggerLoads(logger){
  const loads=S.loads.filter(l=>l.logger===logger);
  if(!loads.length){toast('No loads');return;}
  const loggers=[logger];
  window._sheetData=loads;window._sheetLoggers=loggers;window._sheetLogger=logger;
  renderLoadsSheet();
}
function markLoggerPd(ln){S.loads.forEach(l=>{if(l.logger===ln&&!l.paid)l.paid=true;});save();showLoggerWk(ln);toast('All paid');}

function generateInvoice(saleId){
  const sale=S.sales.find(x=>x.id===saleId);if(!sale)return;

  // Build type breakdown — prefer saved byType, fall back to scanning bundles
  let byType=sale.byType||null;
  if(!byType||Object.keys(byType).length===0){
    byType={};
    const bundles=(sale.bundles||[]).map(id=>S.bundles.find(b=>b.id===id)).filter(Boolean);
    bundles.forEach(b=>{if(!byType[b.type])byType[b.type]={bundles:0,bf:0,pcs:0};byType[b.type].bundles++;byType[b.type].bf+=b.footage;});
  }

  const invoiceNum='INV-'+String(sale.id).padStart(4,'0');
  const driver=sale.driver||'';

  let rows='';
  const hasPcs=Object.values(byType).some(d=>d.pcs>0);
  Object.entries(byType).sort().forEach(([t,d])=>{
    const lineTotal=sale.pricePerBF?(d.bf||0)*sale.pricePerBF:null;
    rows+=`<tr>
      <td style="font-weight:600;">${t}</td>
      <td style="text-align:center;">${d.bundles||d.count||'—'}</td>
      ${hasPcs?`<td style="text-align:center;">${d.pcs||'—'}</td>`:''}
      <td style="text-align:right;">${(d.bf||0).toLocaleString()} bf</td>
      ${sale.pricePerBF?`<td style="text-align:right;">$${lineTotal.toFixed(2)}</td>`:''}
    </tr>`;
  });
  // totals row
  const totalBundles=Object.values(byType).reduce((s,d)=>s+(d.bundles||d.count||0),0);
  const totalPcs=Object.values(byType).reduce((s,d)=>s+(d.pcs||0),0);
  rows+=`<tr style="border-top:2px solid #111;font-weight:700;background:#f9f9f9;">
    <td>TOTAL</td>
    <td style="text-align:center;">${totalBundles}</td>
    ${hasPcs?`<td style="text-align:center;">${totalPcs||'—'}</td>`:''}
    <td style="text-align:right;">${sale.totalBF.toLocaleString()} bf</td>
    ${sale.pricePerBF?`<td style="text-align:right;font-size:15px;">$${sale.total.toFixed(2)}</td>`:''}
  </tr>`;

  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${invoiceNum}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'IBM Plex Mono',monospace;background:#fff;color:#111;padding:32px;max-width:680px;margin:0 auto;font-size:13px;}
    .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;border-bottom:3px solid #111;padding-bottom:16px;}
    .company{font-size:26px;font-weight:700;letter-spacing:2px;}
    .mill{font-size:12px;color:#666;margin-top:2px;}
    .invoice-meta{text-align:right;}
    .invoice-num{font-size:20px;font-weight:700;}
    .invoice-date{font-size:12px;color:#666;margin-top:4px;}
    .parties{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;}
    .label{font-size:9px;color:#888;letter-spacing:1px;font-weight:700;text-transform:uppercase;margin-bottom:6px;}
    .val{font-size:15px;font-weight:700;}
    .sub{font-size:11px;color:#555;margin-top:3px;}
    .driver-val{font-size:14px;font-weight:600;min-height:24px;border-bottom:1px solid #ccc;padding-bottom:4px;}
    table{width:100%;border-collapse:collapse;margin-bottom:20px;}
    thead tr{background:#111;color:#fff;}
    thead th{padding:8px 12px;text-align:left;font-size:11px;letter-spacing:0.5px;}
    tbody tr{border-bottom:1px solid #eee;}
    tbody td{padding:9px 12px;font-size:13px;}
    .footer{margin-top:28px;border-top:1px solid #ccc;padding-top:14px;font-size:11px;color:#aaa;text-align:center;}
    @media print{@page{margin:16mm;}button{display:none;}}
  </style></head><body>
  <div class="header">
    <div><div class="company">MILL MATE</div><div class="mill">${mn(sale.mill)} Mill</div></div>
    <div class="invoice-meta"><div class="invoice-num">${invoiceNum}</div><div class="invoice-date">Date: ${fd(sale.date)}</div></div>
  </div>
  <div class="parties">
    <div>
      <div class="label">Bill To</div>
      <div class="val">${sale.customer}</div>
      <div class="sub">${fd(sale.date)}${sale.pricePerBF?' &nbsp;·&nbsp; $'+sale.pricePerBF.toFixed(3)+'/bf':''}</div>
    </div>
    <div>
      <div class="label">Driver / Hauler</div>
      <div class="driver-val" contenteditable="true" style="outline:none;">${driver}</div>
    </div>
  </div>
  <table>
    <thead><tr>
      <th>Type</th>
      <th style="text-align:center;">Bundles</th>
      ${hasPcs?'<th style="text-align:center;">Pieces</th>':''}
      <th style="text-align:right;">Board Feet</th>
      ${sale.pricePerBF?'<th style="text-align:right;">Amount</th>':''}

  <div class="footer">Mill Mate &nbsp;·&nbsp; ${invoiceNum} &nbsp;·&nbsp; ${fd(sale.date)}</div>

    <button onclick="window.print()" style="background:#111;color:#fff;border:none;border-radius:6px;padding:10px 24px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;">PRINT / SAVE PDF</button>
  </div>
  </body></html>`);
  w.document.close();
}
function exportSales(){
  const sales=fdr(S.sales.filter(s=>s.mill===S.mill),'date',S.fSales);
  const totalBF=sales.reduce((s,x)=>s+x.totalBF,0);
  const totalRev=sales.reduce((s,x)=>s+x.total,0);
  const rows=sales.map(x=>[
    fd(x.date),
    x.customer,
    mn(x.mill),
    x.totalBF.toLocaleString()+' bf',
    '$'+x.pricePerBF.toFixed(3)+'/bf',
    '$'+x.total.toFixed(2),
    x.bundles?x.bundles.length+' bundles':''
  ]);
  // Totals row
  rows.push(['---','---','---','---','---','---','---']);
  rows.push(['TOTAL','','',totalBF.toLocaleString()+' bf','','$'+totalRev.toFixed(2),'']);
  showSheet('SALES — '+mn(S.mill),['Date','Customer','Mill','Board Feet','Price/BF','Total','Bundles'],rows,'sales_'+mn(S.mill)+'_'+td()+'.csv');
}

// Logger price scales — set per-logger prices for all grades across all species
function showSetLoggerPrices(){
  setHdr('LOGGER PRICES',true);pushS(showSettings);resetMC();
  if(!window._lpLogger)window._lpLogger=S.loggers[0]||null;
  renderLoggerPrices();
}
function renderLoggerPrices(){
  const loggers=S.loggers;
  if(!loggers.length){$mc().innerHTML='<div class="empty-state">No loggers added yet</div>';return;}
  if(!window._lpLogger||!loggers.includes(window._lpLogger))window._lpLogger=loggers[0];
  const logger=window._lpLogger;
  if(!S.loggerPrices[logger])S.loggerPrices[logger]={};

  // Logger tabs
  let h='<div class="filter-row">'+loggers.map(l=>'<button class="filter-chip'+(l===logger?' active':'')+'" onclick="window._lpLogger=\''+esc(l)+'\';renderLoggerPrices()">'+l.split(' ')[0]+'</button>').join('')+'</div>';
  h+='<div style="font-size:10px;color:var(--text-dim);margin-bottom:12px;">Set custom prices for '+logger+'. Leave blank to use the default grade price.</div>';

  S.species.forEach(sp=>{
    h+='<div class="sh">'+sp.name+' — '+sp.label+'</div>';
    sp.grades.forEach(g=>{
      const cur=S.loggerPrices[logger][g.id];
      const hasOverride=cur!==undefined;
      h+='<div class="card" style="padding:10px;margin-bottom:6px;">'

function showCalendar(){
  if(isViewer()){showViewerDash();return;}
  S.screen='cal';resetMC();setNav('more');setHdr('CALENDAR',true);
  document.getElementById('review-float').style.display='none';
  S.stack=[showMore];
  if(!window._calYear||!window._calMonth){const n=new Date();window._calYear=n.getFullYear();window._calMonth=n.getMonth();}
  renderCalendar();
}
function calNav(dir){
  window._calMonth+=dir;
  if(window._calMonth>11){window._calMonth=0;window._calYear++;}
  if(window._calMonth<0){window._calMonth=11;window._calYear--;}
  renderCalendar();
}
function renderCalendar(){
  const m=S.mill;const yr=window._calYear;const mo=window._calMonth;
  const monthName=new Date(yr,mo,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const todayStr=td();

  // Build a lookup of what happened each day this month for this mill
  const dayData={};
  const pad=n=>String(n).padStart(2,'0');
  for(let d=1;d<=daysInMonth;d++){
    const ds=yr+'-'+pad(mo+1)+'-'+pad(d);
    const loads=S.loads.filter(l=>l.mill===m&&l.date===ds);
    const takeup=S.takeup.filter(t=>t.mill===m&&t.date===ds);
    const bundles=S.bundles.filter(b=>b.mill===m&&b.date===ds&&!b.isBeam);
    const sales=S.sales.filter(s=>s.mill===m&&s.date===ds);
    const mats=S.mats.filter(x=>x.mill===m&&x.date===ds&&!x.transfer);
    const ships=(S.matShipments||[]).filter(x=>x.mill===m&&x.date===ds);
    if(loads.length||takeup.length||bundles.length||sales.length||mats.length||ships.length){
      dayData[ds]={loads,takeup,bundles,sales,mats,ships};
    }
  }

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <button onclick="calNav(-1)" style="background:none;border:1px solid var(--border);color:var(--amber);border-radius:6px;padding:6px 14px;font-size:18px;cursor:pointer;">‹</button>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--amber);">${monthName}</div>
    <button onclick="calNav(1)" style="background:none;border:1px solid var(--border);color:var(--amber);border-radius:6px;padding:6px 14px;font-size:18px;cursor:pointer;">›</button>
  </div>
  <div class="cal-grid">`;
  ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach(d=>h+='<div class="cal-dow">'+d+'</div>');
  h+='</div><div class="cal-grid">';

  // Empty cells before first day
  for(let i=0;i<firstDay;i++)h+='<div class="cal-day empty"></div>';

  for(let d=1;d<=daysInMonth;d++){
    const ds=yr+'-'+pad(mo+1)+'-'+pad(d);
    const data=dayData[ds];
    const isToday=ds===todayStr;
    h+='<div class="cal-day'+(isToday?' today':'')+(data?' has-data':'')+'" onclick="'+(data||isToday?'showCalDay(\''+ds+'\')':'')+'\">';
    h+='<div class="cal-dn">'+d+'</div>';
    if(data){
      // Color dots: amber=loads, blue=takeup, green=bundles/sales, red=mats
      if(data.loads.length)h+='<div class="cal-dot" style="background:var(--amber);"></div>';
      if(data.takeup.length)h+='<div class="cal-dot" style="background:var(--mill2);"></div>';
      if(data.bundles.length||data.sales.length)h+='<div class="cal-dot" style="background:var(--green);"></div>';
      if(data.mats.length||data.ships.length)h+='<div class="cal-dot" style="background:#9b59b6;"></div>';
    }
    h+='</div>';
  }
  h+='</div>';

  // Legend
  h+='<div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;">';
  [['var(--amber)','Loads'],['var(--mill2)','Sawed'],['var(--green)','Lumber/Sales'],['#9b59b6','Mats']].forEach(([c,l])=>{
    h+='<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-dim);"><div style="width:8px;height:8px;border-radius:50%;background:'+c+';"></div>'+l+'</div>';
  });
  h+='</div>';

  $mc().innerHTML=h;
}

function showCalDay(ds){
  const m=S.mill;
  pushS(()=>{S.screen='cal';renderCalendar();});
  setHdr(fd(ds),true);resetMC();

  const loads=S.loads.filter(l=>l.mill===m&&l.date===ds);
  const takeup=S.takeup.filter(t=>t.mill===m&&t.date===ds);
  const bundles=S.bundles.filter(b=>b.mill===m&&b.date===ds&&!b.isBeam);
  const sales=S.sales.filter(s=>s.mill===m&&s.date===ds);
  const mats=S.mats.filter(x=>x.mill===m&&x.date===ds&&!x.transfer&&!x.adjustment);
  const ships=(S.matShipments||[]).filter(x=>x.mill===m&&x.date===ds);

  const loadBF=loads.reduce((s,l)=>s+l.logs.reduce((a,lg)=>a+lg.footage,0),0);
  const loadVal=loads.reduce((s,l)=>s+l.logs.reduce((a,lg)=>a+(lg.footage*lg.price),0),0);
  const sawBF=takeup.reduce((s,t)=>s+t.footage,0);
  const bundleBF=bundles.reduce((s,b)=>s+b.footage,0);
  const saleVal=sales.reduce((s,x)=>s+x.total,0);
  const saleBF=sales.reduce((s,x)=>s+x.totalBF,0);
  const matLabels={'lam':'Laminated','18ft':"18' Mat",'16ft':"16' Mat"};

  if(!window._calOpen)window._calOpen={};

  function section(key,color,title,summary,itemsHtml){
    const open=!!window._calOpen[key];
    return'<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;">'
      +'<div onclick="window._calOpen[\''+key+'\']=!window._calOpen[\''+key+'\'];showCalDay(\''+ds+'\')" style="padding:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">'
      +'<div style="display:flex;align-items:center;gap:10px;">'
      +'<div style="width:10px;height:10px;border-radius:50%;background:'+color+';flex-shrink:0;"></div>'
      +'<div><div style="font-size:14px;font-weight:700;">'+title+'</div>'
      +'<div style="font-size:11px;color:var(--text-dim);margin-top:2px;">'+summary+'</div></div></div>'
      +'<span style="color:var(--text-dim);font-size:18px;">'+(open?'▲':'▼')+'</span></div>'
      +(open?'<div style="border-top:1px solid var(--border);">'+itemsHtml+'</div>':'')
      +'</div>';
  }

  let h='';

  if(!loads.length&&!takeup.length&&!bundles.length&&!sales.length&&!mats.length&&!ships.length){
    h='<div class="empty-state">No activity on this day</div>';
    $mc().innerHTML=h;return;
  }

  // FOOTAGE BOUGHT — tap load to edit
  if(loads.length){
    const items=loads.map(l=>{
      const bf=l.logs.reduce((s,lg)=>s+lg.footage,0);
      const val=l.logs.reduce((s,lg)=>s+(lg.footage*lg.price),0);
      return'<div class="list-item" onclick="showLoadDetail('+l.id+')" style="border-radius:0;border-left:none;border-right:none;border-top:none;">'
        +'<div class="li-l"><div class="li-t">'+l.logger+'</div><div class="li-s">'+l.logs.length+' logs · '+fb(bf)+'</div></div>'
        +'<div class="li-r"><div class="li-v">'+fm(val)+'</div><span class="badge '+(l.paid?'badge-green':'badge-red')+'">'+(l.paid?'PAID':'UNPAID')+'</span></div></div>';
    }).join('');
    h+=section('loads','var(--amber)','FOOTAGE BOUGHT',loads.length+' loads · '+fb(loadBF)+' · '+fm(loadVal),items);
  }

  // LOG FOOTAGE SAWED — tap to edit, sheet button
  if(takeup.length){
    const yld=bundleBF>0&&sawBF>0?((bundleBF/sawBF)*100).toFixed(1)+'%':'—';
    const items='<div style="padding:8px 14px;border-bottom:1px solid var(--border);">'
      +'<button onclick="calOpenTUSheet(\''+ds+'\')" style="width:100%;background:var(--surface2);border:1px solid var(--amber);color:var(--amber);border-radius:6px;padding:8px;font-family:\'IBM Plex Mono\',monospace;font-size:12px;font-weight:700;cursor:pointer;">📋 VIEW / EDIT SHEET</button>'
      +'</div>'
      +takeup.map(t=>'<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'
        +'<div><div style="font-size:13px;font-weight:600;">'+fb(t.footage)+'</div><div style="font-size:10px;color:var(--text-dim);">'+fm(t.price)+'/bf · $'+(t.footage*t.price).toFixed(2)+'</div></div>'
        +'<div style="display:flex;gap:6px;align-items:center;">'
        +'<button onclick="editTU('+t.id+')" style="background:none;border:1px solid var(--border);color:var(--amber);border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;">✎</button>'
        +'<button onclick="delTU('+t.id+')" style="background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;">✕</button>'
        +'</div></div>').join('');
    h+=section('saw','var(--mill2)','LOG FOOTAGE SAWED',takeup.length+' entries · '+fb(sawBF)+' · yield '+yld,items);
  }

  // SAWED — grouped by type, expandable to see individual bundles
  if(bundles.length){
    if(!window._calBundleOpen)window._calBundleOpen={};
    // Group by type
    const byType={};
    bundles.forEach(b=>{
      if(!byType[b.type])byType[b.type]=[];
      byType[b.type].push(b);
    });
    const typeKeys=Object.keys(byType).sort();
    let items='';
    typeKeys.forEach(t=>{
      const tb=byType[t];
      const tbf=tb.reduce((s,b)=>s+b.footage,0);
      const tOpen=!!window._calBundleOpen[ds+'_'+t];
      // Type summary row — tap to expand
      items+='<div onclick="window._calBundleOpen[\''+ds+'_'+esc(t)+'\']=!window._calBundleOpen[\''+ds+'_'+esc(t)+'\'];showCalDay(\''+ds+'\')" style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:var(--surface2);">'
        +'<div><div style="font-size:14px;font-weight:700;">'+t+'</div>'
        +'<div style="font-size:11px;color:var(--text-dim);">'+tb.length+' bundle'+(tb.length!==1?'s':'')+' · '+tb.reduce((s,b)=>s+b.footage,0).toLocaleString()+' bf</div></div>'
        +'<span style="color:var(--text-dim);font-size:16px;">'+(tOpen?'▲':'▼')+'</span></div>';
      // Individual bundles when expanded
      if(tOpen){
        tb.forEach(b=>{
          items+='<div style="padding:10px 14px 10px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface);">'
            +'<div><div style="font-size:12px;font-weight:600;">'+b.footage.toLocaleString()+' bf</div>'
            +'<div style="font-size:10px;color:var(--text-dim);">'+(b.addedBy||b.by||'')+'</div></div>'
            +'<div style="display:flex;gap:6px;align-items:center;">'
            +'<span style="font-size:10px;color:'+(b.sold?'var(--green)':'var(--text-dim)')+';">'+(b.sold?'SOLD':'STOCK')+'</span>'
            +'<button onclick="event.stopPropagation();calEditBundle('+b.id+',\''+ds+'\')" style="background:none;border:1px solid var(--border);color:var(--amber);border-radius:4px;padding:3px 7px;font-size:11px;cursor:pointer;">✎</button>'
            +'</div></div>';
        });
      }
    });
    h+=section('lumber','var(--green)','SAWED',bundles.length+' bundles · '+fb(bundleBF),items);
  }

  // SALES
  if(sales.length){
    const items=sales.map(s=>'<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'
      +'<div><div style="font-size:13px;font-weight:600;">'+s.customer+'</div><div style="font-size:10px;color:var(--text-dim);">'+(s.bundles?s.bundles.length+' bundles · ':'')+fb(s.totalBF)+'</div></div>'
      +'<div style="font-weight:700;color:var(--amber);">'+fm(s.total)+'</div></div>').join('');
    h+=section('sales','var(--green)','SALES',sales.length+' · '+fb(saleBF)+' · '+fm(saleVal),items);
  }

  // MATS BUILT — show ×count @ MH = rate, inventory before/after
  const mc2={lam:0,'18ft':0,'16ft':0};
  mats.forEach(x=>mc2[x.type]=(mc2[x.type]||0)+x.count);
  const matTotal=mc2.lam+mc2['18ft']+mc2['16ft'];
  const mhLamE=(S.manhours||[]).find(h=>h.date===ds&&h.mill===String(m)&&h.crew==='lam');
  const mhMatE=(S.manhours||[]).find(h=>h.date===ds&&h.mill===String(m)&&h.crew==='mat');
  const mhLamV=mhLamE?mhLamE.hours:0;
  const mhMatV=mhMatE?mhMatE.hours:0;
  const lamMPH=mhLamV>0&&mc2.lam>0?(mc2.lam/mhLamV).toFixed(2):null;
  const matMPH=mhMatV>0&&(mc2['18ft']+mc2['16ft'])>0?((mc2['18ft']+mc2['16ft'])/mhMatV).toFixed(2):null;

  // Calculate inventory before this day (all mats built/shipped before ds)
  const builtBefore={lam:0,'18ft':0,'16ft':0};
  S.mats.filter(x=>x.mill===m&&x.date<ds&&!x.adjustment).forEach(x=>builtBefore[x.type]=(builtBefore[x.type]||0)+x.count);
  const shippedBefore={lam:0,'18ft':0,'16ft':0};
  (S.matShipments||[]).filter(x=>x.mill===m&&x.date<ds).forEach(x=>shippedBefore[x.matType]=(shippedBefore[x.matType]||0)+x.count);
  const invBefore={lam:builtBefore.lam-shippedBefore.lam,'18ft':builtBefore['18ft']-shippedBefore['18ft'],'16ft':builtBefore['16ft']-shippedBefore['16ft']};
  // Built and shipped on this day
  const shipDay={lam:0,'18ft':0,'16ft':0};
  ships.forEach(s=>shipDay[s.matType]=(shipDay[s.matType]||0)+s.count);

  if(mats.length||mhLamV||mhMatV){
    const parts=[];if(mc2.lam)parts.push(mc2.lam+' lam');if(mc2['18ft'])parts.push(mc2['18ft']+" 18'");if(mc2['16ft'])parts.push(mc2['16ft']+" 16'");

    // MH inputs
    const mhRow='<div style="padding:10px 14px;border-bottom:1px solid var(--border);">'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">'
      +'<div><div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">LAM CREW (MH)</div><input type="number" inputmode="decimal" id="cal-mh-lam" value="'+(mhLamV||'')+'" placeholder="0" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--amber);border-radius:6px;padding:6px 8px;font-family:\'IBM Plex Mono\',monospace;font-size:13px;font-weight:700;text-align:center;"></div>'
      +'<div><div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">MAT CREW (MH)</div><input type="number" inputmode="decimal" id="cal-mh-mat" value="'+(mhMatV||'')+'" placeholder="0" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--amber);border-radius:6px;padding:6px 8px;font-family:\'IBM Plex Mono\',monospace;font-size:13px;font-weight:700;text-align:center;"></div>'
      +'</div>'
      +'<button onclick="saveCalMH(\''+ds+'\','+m+')" style="width:100%;background:var(--amber);color:#000;border:none;border-radius:6px;padding:8px;font-family:\'IBM Plex Mono\',monospace;font-size:11px;font-weight:700;cursor:pointer;">SAVE MAN-HOURS</button>'
      +'</div>';

    // Mat rows: type, ×count @ MH = rate, inv before+built=after
    const matItems=mats.map(x=>{
      const mhV=x.type==='lam'?mhLamV:mhMatV;
      const mph=mhV>0?(x.count/mhV).toFixed(2):null;
      const before=invBefore[x.type];
      const after=before+x.count;
      return'<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'
        +'<div>'
        +'<div style="font-size:13px;font-weight:600;">'+(matLabels[x.type]||x.type)+'</div>'
        +'<div style="font-size:10px;color:var(--text-dim);">'+x.by+'</div>'
        +'</div>'
        +'<div style="text-align:right;">'
        +'<div style="font-weight:700;color:var(--amber);">×'+x.count+(mhV?' @ '+mhV+'MH':'')+(mph?'<span style="color:var(--green);font-size:10px;"> = '+mph+'/MH</span>':'')+'</div>'
        +'<div style="font-size:10px;color:var(--text-dim);">'+before+' + '+x.count+' = '+after+'</div>'
        +'</div>'
        +'<div style="display:flex;gap:6px;align-items:center;margin-left:8px;">'
        +'<button onclick="calEditMat('+x.id+',\''+ds+'\')" style="background:none;border:1px solid var(--border);color:var(--amber);border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;">✎</button>'
        +'<button onclick="calDelMat('+x.id+',\''+ds+'\')" style="background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;">✕</button>'
        +'</div></div>';
    }).join('');

    const mhSummary=(lamMPH?mc2.lam+'@'+mhLamV+'MH='+lamMPH:'')+( matMPH?' · '+(mc2['18ft']+mc2['16ft'])+'@'+mhMatV+'MH='+matMPH:'');
    const summary=(parts.length?parts.join(' · '):'no mats')+(mhSummary?' · '+mhSummary:'');
    h+=section('mats','#9b59b6','MATS BUILT',summary,mhRow+matItems);
  }

  // MATS SHIPPED — with inventory before/after
  if(ships.length){
    const shipItems=ships.map(s=>{
      const before=invBefore[s.matType]+mc2[s.matType];
      const after=before-s.count;
      return'<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'
        +'<div><div style="font-size:13px;font-weight:600;">'+(matLabels[s.matType]||s.matType)+' → '+s.customer+'</div>'
        +'<div style="font-size:10px;color:var(--text-dim);">'+s.by+' · '+before+' − '+s.count+' = '+after+'</div></div>'
        +'<div style="font-weight:700;color:var(--mill2);">×'+s.count+'</div></div>';
    }).join('');
    h+=section('ships','var(--mill2)','MATS SHIPPED',ships.reduce((s,x)=>s+x.count,0)+' mats',shipItems);
  }

  $mc().innerHTML=h;
}

// Calendar day helper functions
function calOpenTUSheet(ds){
  S.tuDate=ds;
  window._tuSel=new Set();
  window._tuSheetDate=ds;
  window._tuSheetMill=S.mill;
  setHdr('SHEET — '+fd(ds),true);
  S.stack=[()=>showCalDay(ds)];
  resetMC();
  renderTUSheet(ds,S.mill);
}
function calEditBundle(id,ds){
  const b=S.bundles.find(x=>x.id===id);if(!b)return;
  openModal('<div class="modal-title">EDIT BUNDLE</div>'
    +'<div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">TYPE</div>'
    +'<div class="three-col" style="margin-bottom:10px;">'+S.lumberTypes.map(t=>'<button class="select-btn'+(b.type===t?' selected':'')+'" onclick="this.parentNode.querySelectorAll(\'button\').forEach(x=>x.classList.remove(\'selected\'));this.classList.add(\'selected\');window._calEditBType=\''+esc(t)+'\'">'+t+'</button>').join('')+'</div>'
    +'<div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">BOARD FEET</div>'
    +'<input class="text-input" id="ceb-f" type="number" inputmode="numeric" value="'+b.footage+'">'
    +'<button class="action-btn btn-primary" onclick="saveCalBundle('+id+',\''+ds+'\')">SAVE</button>'
    +'<button class="action-btn btn-secondary" onclick="closeModalForce()">CANCEL</button>');
  window._calEditBType=b.type;
}
function saveCalBundle(id,ds){
  const b=S.bundles.find(x=>x.id===id);if(!b)return;
  const f=parseInt(document.getElementById('ceb-f').value);
  if(!isNaN(f)&&f>0)b.footage=f;
  if(window._calEditBType)b.type=window._calEditBType;
  save();closeModalForce();showCalDay(ds);
}
function calEditMat(id,ds){
  const x=S.mats.find(m=>m.id===id);if(!x)return;
  openModal('<div class="modal-title">EDIT MAT ENTRY</div>'
    +'<div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">COUNT</div>'
    +'<input class="text-input" id="cem-c" type="number" inputmode="numeric" value="'+x.count+'">'
    +'<button class="action-btn btn-primary" onclick="saveCalMat('+id+',\''+ds+'\')">SAVE</button>'
    +'<button class="action-btn btn-secondary" onclick="closeModalForce()">CANCEL</button>');
}
function saveCalMat(id,ds){
  const x=S.mats.find(m=>m.id===id);if(!x)return;
  const oldCount=x.count;
  const c=parseInt(document.getElementById('cem-c').value);
  if(isNaN(c)||c===oldCount){closeModalForce();return;}
  const diff=c-oldCount; // positive = built more, negative = removing mats
  const m=x.mill;
  const getBolts=()=>m===1?S.bolts:S.boltsFC;
  const getBeam=()=>m===1?S.beamInv:S.beamInvFC;
  const setBeam=v=>{if(m===1)S.beamInv=v;else S.beamInvFC=v;};
  // Reverse the material usage for the difference
  if(x.type==='lam'){getBolts().lam-=126*diff;}
  else{getBolts().std-=4*diff;}
  if(x.type==='18ft'){setBeam(getBeam()-500*diff);}
  else if(x.type==='16ft'){setBeam(getBeam()-465*diff);}
  x.count=c;
  save();closeModalForce();showCalDay(ds);
}
function saveCalMH(ds,m){
  if(!S.manhours)S.manhours=[];
  const key=String(m);
  const lamVal=parseFloat(document.getElementById('cal-mh-lam')?.value||0)||0;
  const matVal=parseFloat(document.getElementById('cal-mh-mat')?.value||0)||0;
  ['lam','mat'].forEach((crew,ci)=>{
    const val=ci===0?lamVal:matVal;
    const existing=S.manhours.find(h=>h.date===ds&&h.mill===key&&h.crew===crew);
    if(existing){existing.hours=val;existing.by=S.user?.name;}
    else if(val>0){S.manhours.push({date:ds,mill:key,crew,hours:val,by:S.user?.name});}
  });
  save();toast('MH saved');showCalDay(ds);
}
function calDelMat(id,ds){
  const x=S.mats.find(m=>m.id===id);if(!x)return;
  const m=x.mill;
  const getBolts=()=>m===1?S.bolts:S.boltsFC;
  const getBeam=()=>m===1?S.beamInv:S.beamInvFC;
  const setBeam=v=>{if(m===1)S.beamInv=v;else S.beamInvFC=v;};
  // Add back materials for deleted mats
  if(x.type==='lam'){getBolts().lam+=126*x.count;}
  else{getBolts().std+=4*x.count;}
  if(x.type==='18ft'){setBeam(getBeam()+500*x.count);}
  else if(x.type==='16ft'){setBeam(getBeam()+465*x.count);}
  S.mats=S.mats.filter(m=>m.id!==id);
  save();showCalDay(ds);
}

// ===== INIT =====
async function init(){initFirebase();await load();S._lastTs=S._lastTs||0;renderLogin();}
init();
</script>
